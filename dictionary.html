<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>അറബിക് ഡിഷ്ണറി | Ente Madrasa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #0277bd;
            --bg: #f4f7f6;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0277bd 0%, #01579b 100%);
            margin: 0;
            padding: 20px 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: min(100%, 500px);
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            margin: 0 15px;
            padding: 30px 20px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: "";
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: rgba(2, 119, 189, 0.05);
            border-radius: 50%;
            z-index: 0;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .header i {
            font-size: 50px;
            color: var(--primary);
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 10px rgba(2, 119, 189, 0.2));
        }

        .header h1 {
            font-size: 24px;
            color: #333;
            margin: 0;
            font-weight: 800;
        }

        .header p {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .search-box {
            position: relative;
            margin-bottom: 25px;
            z-index: 1;
        }

        .search-box input {
            width: 100%;
            padding: 18px 20px;
            padding-right: 55px;
            border: 2px solid #e1f5fe;
            border-radius: 20px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            background: #fdfdfd;
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(2, 119, 189, 0.1);
            background: white;
        }

        .search-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 20px;
            cursor: pointer;
        }

        .btn-search {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(2, 119, 189, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-search:active {
            transform: scale(0.98);
        }

        .btn-search:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }

        #resultArea {
            margin-top: 30px;
            padding: 20px;
            background: #f8fbff;
            border-radius: 20px;
            border: 1px solid #e1f5fe;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-weight: 800;
            color: var(--primary);
            font-size: 18px;
            margin-bottom: 12px;
            border-bottom: 2px solid #e1f5fe;
            padding-bottom: 8px;
        }

        .result-content {
            line-height: 1.8;
            color: #444;
            font-size: 15px;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: var(--primary);
        }

        .loading i {
            font-size: 30px;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .back-btn {
            margin-top: 25px;
            text-align: center;
        }

        .back-btn a {
            text-decoration: none;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .back-btn a:hover {
            color: var(--primary);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 25px 15px;
            }
            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <i class="fa fa-book-quran"></i>
            <h1>അറബിക് ഡിഷ്ണറി</h1>
            <p>പദങ്ങളുടെ ലളിതമായ വിശദീകരണം ഇവിടെ ലഭിക്കും</p>
        </div>

        <div class="search-box">
            <input type="text" id="query" placeholder="വാക്ക് ഇവിടെ നൽകുക..." onkeypress="handleKeyPress(event)">
            <i class="fa fa-search" onclick="search()"></i>
        </div>

        <button id="searchBtn" class="btn-search" onclick="search()">
            തിരയുക <i class="fa fa-arrow-right"></i>
        </button>

        <div id="resultArea"></div>

        <div class="back-btn">
            <a href="index.html"><i class="fa fa-arrow-left"></i> തിരികെ പോർട്ടലിലേക്ക്</a>
        </div>
    </div>

    <script>
        function handleKeyPress(e) {
            if (e.key === 'Enter') search();
        }

        async function search() {
            const query = document.getElementById('query').value.trim();
            const resultArea = document.getElementById('resultArea');
            const btn = document.getElementById('searchBtn');

            if (!query) {
                alert("ദയവായി ഒരു വാക്ക് നൽകുക!");
                return;
            }

            resultArea.style.display = "block";
            resultArea.innerHTML = `<div class="loading"><i class="fa fa-spinner"></i><br>വിശദീകരണം തയ്യാറാക്കുന്നു...</div>`;
            btn.disabled = true;

            try {
                let geminiKey = localStorage.getItem('gemini_api_key');
                if (!geminiKey) {
                    const k = prompt("Gemini API Key നൽകുക (ആദ്യതവണ മാത്രം):");
                    if (k) {
                        localStorage.setItem('gemini_api_key', k);
                        geminiKey = k;
                    } else {
                        resultArea.innerHTML = "API Key ഇല്ലാതെ തിരയാൻ സാധിക്കില്ല.";
                        btn.disabled = false;
                        return;
                    }
                }

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `You are an expert Islamic scholar and Arabic linguist. 
                                Explain the following Arabic term/phrase in simple and beautiful Malayalam. 
                                If it's a Fiqh term, explain its meaning and importance. 
                                If it's an Ism (Noun) or Fi'l (Verb), explain its linguistic meaning.
                                The explanation should be in Malayalam. 
                                Formatting: Use a clear title in Malayalam. 
                                Provide a detailed and beautiful explanation. 
                                Term: "${query}"`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    if (data.error.message.includes('API key not valid')) {
                        localStorage.removeItem('gemini_api_key');
                        resultArea.innerHTML = "തെറ്റായ API Key! ദയവായി ശരിയായ കീ നൽകുക.";
                    } else {
                        resultArea.innerHTML = "പിശക്: " + data.error.message;
                    }
                    btn.disabled = false;
                    return;
                }

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    let explanation = data.candidates[0].content.parts[0].text;
                    // Simple formatting
                    explanation = explanation.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                    explanation = explanation.replace(/\n/g, '<br>');
                    
                    resultArea.innerHTML = `
                        <div class="result-title">വാക്ക്: ${query}</div>
                        <div class="result-content">${explanation}</div>
                    `;
                } else {
                    resultArea.innerHTML = "ക്ഷമിക്കണം, വിശദീകരണം കണ്ടെത്താൻ സാധിച്ചില്ല.";
                }
            } catch (error) {
                console.error("Search Error:", error);
                resultArea.innerHTML = "തിരയുന്നതിൽ പിശക് സംഭവിച്ചു. ഇന്റർനെറ്റ് ഉണ്ടോ എന്ന് പരിശോധിക്കുക.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
