<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salah Admin | Boys Only</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --primary: #1b5e20; --bg: #f0f4f1; --gold: #c5a021; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .header { background: linear-gradient(135deg, #1b5e20, #003300); color: white; padding: 25px 15px; text-align: center; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        .card { background: white; padding: 18px; border-radius: 15px; box-shadow: 0 3px 12px rgba(0,0,0,0.06); margin-bottom: 15px; border: 1px solid #e0e0e0; }
        label { font-weight: bold; color: #333; display: block; margin-bottom: 8px; font-size: 14px; }
        select, input[type="date"] { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        select:focus, input:focus { border-color: var(--primary); }

        .student-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #f0f0f0; background: white; margin-bottom: 8px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .student-info b { font-size: 17px; color: #1b5e20; display: block; }
        .student-info small { color: #666; font-weight: 500; }
        
        .salah-grid { display: flex; gap: 8px; }
        .salah-box { 
            width: 42px; height: 42px; border: 2px solid #ddd; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-size: 14px; font-weight: 800; transition: 0.3s;
            background: #fff; color: #888;
        }
        .salah-box.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 3px 8px rgba(27, 94, 32, 0.4); }

        .save-bar { position: sticky; bottom: 20px; width: 100%; text-align: center; z-index: 100; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 16px 60px; border-radius: 50px; font-weight: bold; font-size: 18px; box-shadow: 0 6px 20px rgba(0,0,0,0.2); cursor: pointer; transition: 0.3s; }
        .btn-save:active { transform: scale(0.95); }
        
        .loading { text-align: center; padding: 30px; color: #1b5e20; font-weight: bold; }
        .gender-badge { background: #e3f2fd; color: #1976d2; font-size: 10px; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; margin-top: 4px; display: inline-block; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;"><i class="fa fa-user-check"></i> BOYS SALAH TRACKER</h2>
    <p style="margin:5px 0 0; font-size:14px; opacity: 0.8;">മദ്റസ നിസ്‌കാര കണക്കുകൾ (+2 വരെ)</p>
</div>

<div class="card">
    <label><i class="fa fa-calendar-alt"></i> തിയ്യതി:</label>
    <input type="date" id="salahDate" onchange="loadStudents()">
    
    <label><i class="fa fa-graduation-cap"></i> ക്ലാസ്:</label>
    <select id="classSelect" onchange="loadStudents()">
        <option value="">ക്ലാസ് തിരഞ്ഞെടുക്കുക</option>
        <option value="1">Class 1</option>
        <option value="2">Class 2</option>
        <option value="3">Class 3</option>
        <option value="4">Class 4</option>
        <option value="5">Class 5</option>
        <option value="6">Class 6</option>
        <option value="7">Class 7</option>
        <option value="8">Class 8</option>
        <option value="9">Class 9</option>
        <option value="10">Class 10</option>
        <option value="+1">Plus One (+1)</option>
        <option value="+2">Plus Two (+2)</option>
    </select>
</div>

<div id="studentList" style="display:none; margin-bottom: 100px;">
    </div>

<div class="save-bar" id="saveSection" style="display:none;">
    <button class="btn-save" onclick="saveAllSalah()"><i class="fa fa-check-circle"></i> SAVE ATTENDANCE</button>
</div>

<script>
    async function loadStudents() {
    const cls = document.getElementById('classSelect').value;
    const date = document.getElementById('salahDate').value;
    if(!cls || !date) return;

    const listDiv = document.getElementById('studentList');
    listDiv.innerHTML = "<div class='loading'><i class='fa fa-spinner fa-spin'></i> വിവരങ്ങൾ തിരയുന്നു...</div>";
    listDiv.style.display = 'block';

    // മദ്റസ ഐഡിക്ക് കീഴിലുള്ള കുട്ടികളെ നേരിട്ട് എടുക്കുന്നു
    db.ref(`students/${mid}`).once('value', async snap => {
        listDiv.innerHTML = "";
        let found = false;

        // പഴയ റെക്കോർഡുകൾ ഉണ്ടോ എന്ന് നോക്കുന്നു
        const savedSnap = await db.ref(`salah_records/${mid}`).once('value');
        const savedData = savedSnap.val() || {};

        snap.forEach(child => {
            const s = child.val();
            
            // ക്ലാസ്സ് നമ്പറാണോ അക്ഷരമാണോ എന്ന് നോക്കാതെ കൃത്യമായി ഫിൽട്ടർ ചെയ്യുന്നു
            // ഡാറ്റാബേസിൽ "5" എന്നാണെങ്കിലും ഇവിടെ "Class 5" എന്നാണെങ്കിലും ഇത് വർക്ക് ആകും
            let studentClass = String(s.class).toLowerCase().replace("class", "").trim();
            let selectedClass = String(cls).toLowerCase().replace("class", "").trim();

            if(studentClass === selectedClass) {
                found = true;
                const sid = child.key;
                const dayData = (savedData[sid] && savedData[sid][date]) ? savedData[sid][date] : {f:0, d:0, a:0, m:0, i:0};
                currentSalahs[sid] = dayData;

                listDiv.innerHTML += `
                    <div class="student-item card">
                        <div class="student-info">
                            <b>${s.name}</b>
                            <small>Roll: ${s.rollNo || '-'}</small>
                        </div>
                        <div class="salah-grid">
                            <div class="salah-box ${dayData.f?'active':''}" id="f_${sid}" onclick="toggle('${sid}','f')">F</div>
                            <div class="salah-box ${dayData.d?'active':''}" id="d_${sid}" onclick="toggle('${sid}','d')">D</div>
                            <div class="salah-box ${dayData.a?'active':''}" id="a_${sid}" onclick="toggle('${sid}','a')">A</div>
                            <div class="salah-box ${dayData.m?'active':''}" id="m_${sid}" onclick="toggle('${sid}','m')">M</div>
                            <div class="salah-box ${dayData.i?'active':''}" id="i_${sid}" onclick="toggle('${sid}','i')">I</div>
                        </div>
                    </div>`;
            }
        });

        if(!found) {
            listDiv.innerHTML = "<div class='card' style='text-align:center; padding:20px;'>ഈ ക്ലാസ്സിൽ കുട്ടികളെ കണ്ടെത്താനായില്ല!</div>";
            document.getElementById('saveSection').style.display = 'none';
        } else {
            document.getElementById('saveSection').style.display = 'block';
        }
    }).catch(error => {
        listDiv.innerHTML = "<div class='card' style='color:red;'>Error: " + error.message + "</div>";
    });
}
</script>

</body>
</html>
