<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>എന്റെ മദ്റസ | Misbahul Uloom</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #004d00; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn:disabled { background: #888; }
        .page { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div id="regPage" class="page active">
        <h2 style="text-align:center; color:var(--primary);">പുതിയ രജിസ്‌ട്രേഷൻ</h2>
        <input type="text" id="mName" placeholder="മദ്റസയുടെ പേര്">
        <input type="text" id="mPlace" placeholder="സ്ഥലം">
        <input type="text" id="mReg" placeholder="രജിസ്റ്റർ നമ്പർ">
        <input type="text" id="mUser" placeholder="User ID">
        <input type="password" id="mUsthadPass" placeholder="ഉസ്താദ് പാസ്‌വേഡ്">
        <input type="password" id="mParentPass" placeholder="പാരന്റ് പാസ്‌വേഡ്">
        <button class="btn" id="regBtn" onclick="register()">Register Now</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
        authDomain: "enttemadrasa.firebaseapp.com",
        databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com",
        projectId: "enttemadrasa",
        storageBucket: "enttemadrasa.firebasestorage.app",
        appId: "1:623531881201:web:b863793340c3901cedaf50"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function register() {
        const uInput = document.getElementById('mUser').value.trim();
        const btn = document.getElementById('regBtn');
        
        if(!uInput) return alert("User ID നൽകുക!");

        btn.disabled = true;
        btn.innerText = "പ്രോസസ്സ് ചെയ്യുന്നു...";

        try {
            const data = {
                name: document.getElementById('mName').value,
                place: document.getElementById('mPlace').value,
                reg: document.getElementById('mReg').value,
                usthadPass: document.getElementById('mUsthadPass').value,
                parentPass: document.getElementById('mParentPass').value,
                status: "approved"
            };

            await db.ref('madrasa_requests/' + uInput).set(data);
            alert("വിജയകരമായി രജിസ്റ്റർ ചെയ്തു!");
            location.reload(); 
        } catch (e) {
            alert("Error: " + e.message);
            btn.disabled = false;
            btn.innerText = "Register Now";
        }
    }
</script>
</body>
</html>
