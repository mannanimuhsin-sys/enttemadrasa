<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>പെയ്‌മെന്റ് ലോഗിൻ</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #004d00; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { width: 90%; max-width: 350px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-box">
    <h2 style="color: var(--primary);">വിദ്യാർത്ഥി ലോഗിൻ</h2>
    <p style="font-size: 13px; color: #666;">പെയ്‌മെന്റ് വിവരങ്ങൾ കാണാൻ ലോഗിൻ ചെയ്യുക</p>
    <input type="number" id="regNo" placeholder="രജിസ്റ്റർ നമ്പർ">
    <input type="password" id="pass" placeholder="പാസ്‌വേഡ്">
    <button class="btn" onclick="login()">LOGIN</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
        authDomain: "enttemadrasa.firebaseapp.com",
        databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com",
        projectId: "enttemadrasa",
        storageBucket: "enttemadrasa.firebasestorage.app",
        appId: "1:623531881201:web:b863793340c3901cedaf50"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const mID = urlParams.get('id');

    function login() {
        const reg = document.getElementById('regNo').value;
        const pass = document.getElementById('pass').value;

        if(!reg || !pass) return alert("വിവരങ്ങൾ നൽകുക");

        // ഐഡി കാർഡ് പോർട്ടലിൽ സേവ് ചെയ്തിട്ടുള്ള 'students' ലിസ്റ്റിൽ തിരയുന്നു
        db.ref('students/' + mID).orderByChild('reg').equalTo(reg).once('value', snap => {
            let found = false;
            snap.forEach(child => {
                const s = child.val();
                if(s.pass === pass) { // ഐഡി കാർഡിന്റെ പാസ്‌വേഡ് തന്നെ ഉപയോഗിക്കുന്നു
                    found = true;
                    localStorage.setItem("loggedStudentReg", reg);
                    localStorage.setItem("loggedStudentName", s.name);
                    window.location.href = `payment_view.html?id=${mID}`;
                }
            });
            if(!found) alert("രജിസ്റ്റർ നമ്പറോ പാസ്‌വേഡോ തെറ്റാണ്!");
        });
    }
</script>
</body>
</html>
