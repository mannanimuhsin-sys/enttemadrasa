<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്റസ പെയ്‌മെന്റ് പോർട്ടൽ</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #004d00; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: var(--white); padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .logo { font-size: 50px; color: var(--primary); margin-bottom: 10px; }
        h2 { color: var(--primary); margin-bottom: 20px; font-size: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #003300; }
        
        #paymentArea { display: none; width: 100%; max-width: 500px; margin: 20px auto; }
        .payment-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #f39c12; }
        .payment-card h4 { margin: 0; color: #333; }
        .status { font-size: 12px; font-weight: bold; padding: 4px 8px; border-radius: 4px; float: right; }
        .paid { background: #e8f5e9; color: #2e7d32; }
        .pending { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>

<div id="loginSection" class="login-box">
    <div class="logo"><i class="fa fa-university"></i></div>
    <h2>രക്ഷിതാക്കളുടെ ലോഗിൻ</h2>
    <input type="text" id="regNo" placeholder="രജിസ്റ്റർ നമ്പർ (Reg No)">
    <input type="password" id="pass" placeholder="പാസ്‌വേഡ്">
    <button class="btn" onclick="login()">ലോഗിൻ ചെയ്യുക</button>
</div>

<div id="paymentArea">
    <div style="background: var(--primary); color: white; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
        <h3 id="studentHeader" style="margin:0; font-size: 18px;">വിദ്യാർത്ഥിയുടെ പേര്</h3>
        <small id="regSub">Reg No: 000</small>
    </div>
    <div id="listContainer"></div>
    <button class="btn" style="background:#888; margin-top:10px;" onclick="location.reload()">LOGOUT</button>
</div>

<script>
// നിങ്ങളുടെ ഐഡി കാർഡ് പാനലിലെ അതേ Firebase Config ഇവിടെയും ഉപയോഗിക്കുക
const firebaseConfig = {
    apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
    databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com",
    projectId: "enttemadrasa"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const rtdb = firebase.database();

// Madrasa ID URL-ൽ നിന്ന് എടുക്കുന്നു (ഉദാ: login.html?id=101)
const mID = new URLSearchParams(window.location.search).get('id');

// പാസ്‌വേഡ് ഹാഷ് ചെയ്യാനുള്ള ഫംഗ്‌ഷൻ
async function hashPassword(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function login() {
    const reg = document.getElementById('regNo').value.trim();
    const pass = document.getElementById('pass').value.trim();

    if(!reg || !pass || !mID) return alert("വിവരങ്ങൾ പൂർണ്ണമല്ല!");

    try {
        // 1. ഫയർസ്റ്റോറിൽ നിന്ന് വിദ്യാർത്ഥിയെ കണ്ടെത്തുന്നു
        const docId = mID + "_" + reg;
        const doc = await db.collection("students").doc(docId).get();

        if(!doc.exists) {
            return alert("വിദ്യാർത്ഥിയെ കണ്ടെത്തിയില്ല! രജിസ്റ്റർ നമ്പർ പരിശോധിക്കുക.");
        }

        const student = doc.data();
        const inputHash = await hashPassword(pass);

        // 2. പാസ്‌വേഡ് ഒത്തുനോക്കുന്നു
        if(inputHash === student.password) {
            showDashboard(student);
        } else {
            alert("തെറ്റായ പാസ്‌വേഡ്!");
        }
    } catch (e) {
        alert("Error: " + e.message);
    }
}

function showDashboard(student) {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('paymentArea').style.display = 'block';
    document.getElementById('studentHeader').innerText = student.name;
    document.getElementById('regSub').innerText = "Reg No: " + (student.regno || student.number);

    loadPayments(student.regno || student.number);
}

function loadPayments(reg) {
    const container = document.getElementById('listContainer');
    container.innerHTML = "<p style='text-align:center;'>പെയ്‌മെന്റ് വിവരങ്ങൾ തിരയുന്നു...</p>";

    // Realtime Database-ൽ നിന്ന് പെയ്‌മെന്റ് ലിസ്റ്റ് എടുക്കുന്നു
    rtdb.ref(`payments/${mID}/${reg}`).on('value', snap => {
        let html = "";
        if(!snap.exists()) {
            container.innerHTML = "<div class='payment-card'>നിലവിൽ പെയ്‌മെന്റ് റിക്വസ്റ്റുകൾ ഒന്നുമില്ല.</div>";
            return;
        }

        snap.forEach(child => {
            const p = child.val();
            const statusClass = p.status === 'Paid' ? 'paid' : 'pending';
            html += `
                <div class="payment-card">
                    <span class="status ${statusClass}">${p.status.toUpperCase()}</span>
                    <h4>${p.title}</h4>
                    <p style="margin: 5px 0 0; color: #666;">തുക: <b>₹${p.amount}</b></p>
                    <small style="color:#999;">Date: ${p.date || ''}</small>
                </div>
            `;
        });
        container.innerHTML = html;
    });
}
</script>

</body>
</html>
