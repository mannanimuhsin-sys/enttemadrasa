<!DOCTYPE html>
<html>
<head>
    <title>Quiz Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .admin-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2 { color: #004d00; text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-add { background: #004d00; color: white; }
        .btn-publish { background: #ff9800; color: white; }
        .btn-danger { background: #f44336; color: white; }
        .q-list { margin-top: 20px; border-top: 2px solid #eee; padding-top: 10px; }
        .q-item { background: #f9f9f9; padding: 10px; margin-bottom: 5px; border-radius: 5px; font-size: 14px; position: relative; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2 id="madrasaName">Loading...</h2>
    <p id="quizStatus" style="text-align:center; font-weight:bold; color:#444; margin-bottom:8px;">Quiz Status: Draft</p>
    <h4 style="text-align:center;">Special Day Quiz Creator</h4>

    <input type="text" id="quizHeading" placeholder="പ്രോഗ്രാം ഹെഡിംഗ് (ഉദാ: മീലാദ് ക്വിസ്)">
    <input type="datetime-local" id="quizTime" title="ക്വിസ് തുടങ്ങേണ്ട സമയം">
    
    <hr>
    
    <div id="questionForm">
        <input type="text" id="qText" placeholder="ചോദ്യം എഴുതുക">
        <input type="text" id="opt1" placeholder="Option 1">
        <input type="text" id="opt2" placeholder="Option 2">
        <input type="text" id="opt3" placeholder="Option 3">
        <input type="text" id="opt4" placeholder="Option 4">
        <select id="correctOpt">
            <option value="">ശരിയുത്തരം തിരഞ്ഞെടുക്കുക</option>
            <option value="1">Option 1</option>
            <option value="2">Option 2</option>
            <option value="3">Option 3</option>
            <option value="4">Option 4</option>
        </select>
        <button class="btn btn-add" onclick="addQuestion()">ADD QUESTION</button>
    </div>
    <div class="q-list" id="qListArea">
        </div>

    <button class="btn btn-publish" onclick="publishQuiz()">PUBLISH QUIZ</button>
    <button class="btn" style="background: #607D8B; color: white;" onclick="stopQuiz()">STOP QUIZ</button>
    <button class="btn btn-danger" onclick="clearQuiz()">REFRESH / CLEAR ALL</button>
    <button class="btn" style="background: #2196F3; color: white;" 
        onclick="window.location.href='admin_results.html?id=' + mID">
    VIEW RESULTS & POSTER
</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
        authDomain: "enttemadrasa.firebaseapp.com",
        databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com",
        projectId: "enttemadrasa",
        storageBucket: "enttemadrasa.firebasestorage.app",
        appId: "1:623531881201:web:b863793340c3901cedaf50"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const firestore = firebase.firestore();

    // URL-ൽ നിന്ന് മദ്റസ ID എടുക്കുന്നു
    const urlParams = new URLSearchParams(window.location.search);
    const mID = urlParams.get('id');

    // മദ്റസ പേര് ലോഡ് ചെയ്യാൻ (ഫയർസ്റ്റോറിൽ നിന്ന്)
    async function loadMadrasaName() {
        if (!mID) return;
        const doc = await firestore.collection('madrasa_requests').doc(mID).get();
        if (doc.exists) {
            document.getElementById('madrasaName').innerText = doc.data().name;
        } else {
            db.ref('madrasa_requests/' + mID).once('value', snap => {
                if(snap.val()) document.getElementById('madrasaName').innerText = snap.val().name;
            });
        }
    }
    loadMadrasaName();

    let questions = [];

    function addQuestion() {
        const q = {
            question: document.getElementById('qText').value,
            options: [
                document.getElementById('opt1').value,
                document.getElementById('opt2').value,
                document.getElementById('opt3').value,
                document.getElementById('opt4').value
            ],
            correct: document.getElementById('correctOpt').value
        };

        if(!q.question || !q.correct) return alert("വിവരങ്ങൾ പൂർണ്ണമല്ല!");

        questions.push(q);
        renderQuestions();
        
        // ഫോം ക്ലിയർ ചെയ്യാൻ
        document.getElementById('qText').value = "";
        document.getElementById('opt1').value = "";
        document.getElementById('opt2').value = "";
        document.getElementById('opt3').value = "";
        document.getElementById('opt4').value = "";
    }

    function renderQuestions() {
        const area = document.getElementById('qListArea');
        if (!questions.length) {
            area.innerHTML = '<p style="color:#555; padding:10px;">ഇപ്പോൾ ചോദ്യങ്ങൾ ഇനിയും ചേർത്തിട്ടില്ല.</p>';
            return;
        }
        area.innerHTML = questions.map((q, i) => `
            <div class="q-item">
                <b>${i+1}. ${q.question}</b> (Ans: ${q.correct})
                <span style="color:red; cursor:pointer; float:right;" onclick="removeQ(${i})">Delete</span>
            </div>
        `).join('');
    }

    function removeQ(index) {
        questions.splice(index, 1);
        renderQuestions();
    }

    async function loadExistingQuiz() {
        if (!mID) return;
        
        // ✅ ആദ്യം ഫയർസ്റ്റോറിൽ നോക്കുന്നു
        const doc = await firestore.collection('quizzes').doc(mID).get();
        let data = doc.exists ? doc.data() : null;

        if (!data) {
            // ഫയർസ്റ്റോറിൽ ഇല്ലെങ്കിൽ ബാക്ക്-അപ്പ് ആയി RTDB നോക്കുന്നു
            const snap = await db.ref('quizzes/' + mID).once('value');
            data = snap.val();
        }

        if (!data) return;

        document.getElementById('quizHeading').value = data.heading || '';
        if (data.startTime) {
            const dt = new Date(data.startTime);
            document.getElementById('quizTime').value = dt.toISOString().slice(0,16);
        }
        updateQuizStatus(data.status || 'draft');
        if (data.questions && Array.isArray(data.questions)) {
            questions = data.questions;
            renderQuestions();
        }
    }

    function publishQuiz() {
        const heading = document.getElementById('quizHeading').value;
        const time = document.getElementById('quizTime').value;

        if(!heading || questions.length === 0) return alert("ഹെഡിംഗും ചോദ്യങ്ങളും നിർബന്ധമാണ്!");

        const quizData = {
            heading: heading,
            startTime: new Date(time).getTime(),
            questions: questions,
            status: "published",
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        // ✅ ഫയർസ്റ്റോറിൽ സേവ് ചെയ്യുന്നു
        firestore.collection('quizzes').doc(mID).set(quizData).then(() => {
            updateQuizStatus('published');
            alert("ക്വിസ് ഫയർസ്റ്റോറിൽ പബ്ലിഷ് ചെയ്തു!");
        });

        // ✅ സുപാബേസിലേക്ക് സിങ്ക് ചെയ്യുന്നു
        try {
            supabase.from('quizzes').upsert({
                madrasa_id: mID,
                heading: heading,
                start_time: new Date(time).getTime(),
                questions: questions,
                status: "published",
                updated_at: new Date().toISOString()
            }, { onConflict: 'madrasa_id' }).then(({ error }) => {
                if (error) console.error("Supabase Save Error:", error);
            });
        } catch (e) {
            console.error("Supabase Sync Failed:", e);
        }

        // പഴയ സിസ്റ്റത്തിന് വേണ്ടി RTDB-ലും സേവ് ചെയ്യാം
        db.ref('quizzes/' + mID).set(quizData);
    }

    function stopQuiz() {
        if (!confirm('ഈ ക്വിസ് നിർത്തണോ?')) return;
        
        firestore.collection('quizzes').doc(mID).update({ status: 'stopped' }).then(() => {
            updateQuizStatus('stopped');
            alert('Quiz stopped in Firestore.');
        });
        
        db.ref('quizzes/' + mID).update({ status: 'stopped' });
    }

    function updateQuizStatus(status) {
        const statusText = status === 'published' ? 'Published' : status === 'stopped' ? 'Stopped' : 'Draft';
        document.getElementById('quizStatus').innerText = `Quiz Status: ${statusText}`;
    }

    function clearQuiz() {
        if(confirm("എല്ലാ ചോദ്യങ്ങളും റിസൾട്ടും ക്ലിയർ ചെയ്യണോ?")) {
            // ✅ ഫയർസ്റ്റോറിൽ നിന്ന് നീക്കം ചെയ്യുന്നു
            firestore.collection('quizzes').doc(mID).delete();
            
            // സബ്മിഷനുകൾ നീക്കം ചെയ്യാൻ ബാച്ച് അല്ലെങ്കിൽ ഫംഗ്ഷൻ ആവശ്യമാണ്, 
            // തൽക്കാലം ക്വിസ് മാത്രം ഡിലീറ്റ് ചെയ്യുന്നു.
            
            db.ref('quizzes/' + mID).remove();
            db.ref('quiz_submissions/' + mID).remove();
            location.reload();
        }
    }

    window.onload = loadExistingQuiz;
</script>

</body>
</html>
