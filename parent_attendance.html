<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ഹാജർ ഹോട്ടൽ | Parents Portal</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --primary: #004d00; --gold: #d4af37; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 15px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        .header { text-align: center; background: linear-gradient(135deg, var(--primary), #002b00); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        
        .login-section { display: block; }
        .attendance-section { display: none; }
        
        .login-form { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        
        .student-info { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .student-name { font-size: 18px; font-weight: bold; color: var(--primary); }
        .student-details { color: #666; margin-top: 5px; }
        
        .attendance-list { }
        .summary-card { background: #eaf4ea; border: 1px solid #d4e8d4; border-radius: 12px; padding: 15px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
        .summary-item { text-align: center; }
        .summary-value { font-size: 20px; font-weight: bold; color: var(--primary); }
        .summary-label { font-size: 12px; color: #555; margin-top: 5px; }
        .attendance-item { background: white; border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-bottom: 10px; }
        .month-header { font-weight: bold; color: var(--primary); margin-bottom: 10px; font-size: 16px; }
        .attendance-stats { display: flex; justify-content: space-between; align-items: center; }
        .stat { text-align: center; flex: 1; }
        .stat-value { font-size: 24px; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 12px; color: #666; }
        .percentage { font-size: 18px; font-weight: bold; color: #28a745; }
        
        .btn { padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        
        .actions { text-align: center; margin-top: 20px; }
        
        .no-data { text-align: center; color: #666; padding: 40px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fa fa-calendar-check"></i> ഹാജർ ഹോട്ടൽ</h1>
        <p>രക്ഷിതാക്കളുടെ പോർട്ടൽ</p>
    </div>
    
    <div id="loginSection" class="login-section">
        <div class="login-form">
            <div class="form-group">
                <label>വിദ്യാർത്ഥിയുടെ രജിസ്റ്റർ നമ്പർ</label>
                <input type="text" id="regNumber" placeholder="രജിസ്റ്റർ നമ്പർ നൽകുക">
            </div>
            <div class="form-group">
                <label>പാസ്‌വേഡ്</label>
                <input type="password" id="password" placeholder="പാസ്‌വേഡ് നൽകുക">
            </div>
            <div class="actions">
                <button class="btn btn-primary" onclick="login()">ലോഗിൻ ചെയ്യുക</button>
            </div>
        </div>
    </div>
    
    <div id="attendanceSection" class="attendance-section">
        <div id="studentInfo" class="student-info"></div>
        <div id="attendanceSummary" class="summary-card" style="display:none;"></div>
        <div id="attendanceList" class="attendance-list"></div>
        
        <div class="actions">
            <button class="btn btn-secondary" onclick="logout()">പുറത്ത് കടക്കുക</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCe98Gw-si7idO0m8y5xbLLG8Z2HC3RCKE",
  authDomain: "mum-new-id.firebaseapp.com",
  projectId: "mum-new-id",
  storageBucket: "mum-new-id.firebasestorage.app",
  messagingSenderId: "794343464244",
  appId: "1:794343464244:web:f9083036490e3609bf1961",
  databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const rtdb = firebase.database();

const urlParams = new URLSearchParams(window.location.search);
let madrasaId = urlParams.get('mid');

let currentStudent = null;

async function hashPassword(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function login() {
    const regNumber = document.getElementById('regNumber').value.trim();
    const password = document.getElementById('password').value.trim();
    
    if(!regNumber || !password) {
        alert("ദയവായി രജിസ്റ്റർ നമ്പറും പാസ്‌വേഡും നൽകുക!");
        return;
    }
    
    try {
        const passHash = await hashPassword(password);
        
        // Find student by document ID first, then fallback to number or regno fields.
        let studentDoc = await db.collection("students").doc(regNumber).get();
        if(!studentDoc.exists) {
            const fallbackSnap = await db.collection("students")
                .where("number", "==", regNumber)
                .limit(1)
                .get();
            if(fallbackSnap.empty) {
                const fallbackSnap2 = await db.collection("students")
                    .where("regno", "==", regNumber)
                    .limit(1)
                    .get();
                if(!fallbackSnap2.empty) {
                    studentDoc = fallbackSnap2.docs[0];
                }
            } else {
                studentDoc = fallbackSnap.docs[0];
            }
        }
        
        if(!studentDoc.exists) {
            alert("രജിസ്റ്റർ നമ്പർ കണ്ടെത്തിയില്ല! ദയവായി ശരിയായ രജിസ്റ്റർ നമ്പർ നൽകുക.");
            return;
        }
        
        const studentData = studentDoc.data();
        const storedPassword = studentData.password || "";
        const passwordMatches = storedPassword === passHash || storedPassword === password;
        if(!passwordMatches || studentData.status !== "approved") {
            alert("തെറ്റായ രജിസ്റ്റർ നമ്പറോ പാസ്‌വേഡോ!" );
            return;
        }
        
        if(madrasaId && studentData.madrasa_id !== madrasaId) {
            // If the page had a madrasa ID param, make sure the student belongs to it.
            alert("ഈ വിദ്യാർത്ഥി ഈ മദ്രസായ്ക്ക് ബന്ധപ്പെട്ടിട്ടില്ല.");
            return;
        }
        
        currentStudent = { id: studentDoc.id, ...studentData };
        madrasaId = studentData.madrasa_id;
        
        // Show attendance section
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('attendanceSection').style.display = 'block';
        
        // Load student info
        loadStudentInfo();
        
        // Load attendance
        loadAttendance();
        
    } catch(error) {
        console.error("Login error:", error);
        alert("ലോഗിൻ ചെയ്യുന്നതിൽ പിശക്!");
    }
}

function loadStudentInfo() {
    const info = document.getElementById('studentInfo');
    const regNo = currentStudent.regno || currentStudent.number || currentStudent.id;
    info.innerHTML = `
        <div class="student-name">${currentStudent.name}</div>
        <div class="student-details">ക്ലാസ്: ${currentStudent.class} | രജിസ്റ്റർ നമ്പർ: ${regNo}</div>
    `;
}

async function loadAttendance() {
    try {
        const attendanceQuery = db.collection("attendance")
            .where("madrasa_id", "==", madrasaId)
            .where("class", "==", currentStudent.class);
        
        const attendanceSnap = await attendanceQuery.get();
        
        const list = document.getElementById('attendanceList');
        list.innerHTML = '';

        if(attendanceSnap.empty) {
            list.innerHTML = '<div class="no-data">ഹാജർ വിവരങ്ങൾ ലഭ്യമല്ല</div>';
            return;
        }

        const attendanceDocs = [];
        attendanceSnap.forEach(doc => attendanceDocs.push({ id: doc.id, ...doc.data() }));
        attendanceDocs.sort((a, b) => {
            if(a.year !== b.year) return b.year - a.year;
            return b.month - a.month;
        });

        const studentKey = currentStudent.id || currentStudent.regno || currentStudent.number;
        const studentReg = currentStudent.regno || currentStudent.number || currentStudent.id;
        const studentNum = currentStudent.number || currentStudent.regno || currentStudent.id;
        let totalMonths = attendanceDocs.length;
        let totalWorkingDays = 0;
        let totalPresentDays = 0;

        attendanceDocs.forEach(data => {
            totalWorkingDays += data.total_days || 0;
            const present = data.students ? (data.students[studentKey] || data.students[studentReg] || data.students[studentNum] || 0) : 0;
            totalPresentDays += present;
        });

        const overallPercentage = totalWorkingDays > 0 ? Math.round((totalPresentDays / totalWorkingDays) * 100) : 0;
        document.getElementById('attendanceSummary').innerHTML = `
            <div class="summary-item">
                <div class="summary-value">${totalMonths}</div>
                <div class="summary-label">മാസങ്ങൾ</div>
            </div>
            <div class="summary-item">
                <div class="summary-value">${totalWorkingDays}</div>
                <div class="summary-label">മൊത്തം പ്രവർത്തി ദിവസം</div>
            </div>
            <div class="summary-item">
                <div class="summary-value">${totalPresentDays}</div>
                <div class="summary-label">നിങ്ങളുടെ ഹാജർ</div>
            </div>
            <div class="summary-item">
                <div class="summary-value">${overallPercentage}%</div>
                <div class="summary-label">മൊത്തം ശതമാനം</div>
            </div>
            <div class="summary-item">
                <div class="summary-value">${currentStudent.class || '-'}</div>
                <div class="summary-label">ക്ലാസ്</div>
            </div>
            <div class="summary-item">
                <div class="summary-value">${studentReg}</div>
                <div class="summary-label">Reg No</div>
            </div>
        `;
        document.getElementById('attendanceSummary').style.display = 'grid';

        const monthNames = [
            "ജനുവരി", "ഫെബ്രുവരി", "മാർച്ച്", "ഏപ്രിൽ", "മേയ്", "ജൂൺ",
            "ജುലൈ", "ആഗസ്റ്റ്", "സെപ്റ്റംബർ", "ഒക്ടോബർ", "നവംബർ", "ഡിസംബർ"
        ];

        attendanceDocs.forEach(data => {
            const studentAttendance = data.students ? (data.students[studentKey] || data.students[studentReg] || data.students[studentNum] || 0) : 0;
            const percentage = data.total_days > 0 ? Math.round((studentAttendance / data.total_days) * 100) : 0;
            const item = document.createElement('div');
            item.className = 'attendance-item';
            item.innerHTML = `
                <div class="month-header">${monthNames[data.month - 1]} ${data.year}</div>
                <div class="attendance-stats">
                    <div class="stat">
                        <div class="stat-value">${data.total_days}</div>
                        <div class="stat-label">മൊത്തം ദിവസങ്ങൾ</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${studentAttendance}</div>
                        <div class="stat-label">നിങ്ങളുടെ ഹാജർ</div>
                    </div>
                    <div class="stat">
                        <div class="percentage">${percentage}%</div>
                        <div class="stat-label">ശതമാനം</div>
                    </div>
                </div>
            `;
            list.appendChild(item);
        });
    } catch(error) {
        console.error("Error loading attendance:", error);
        document.getElementById('attendanceList').innerHTML = '<div class="no-data">ഹാജർ വിവരങ്ങൾ ലോഡ് ചെയ്യുന്നതിൽ പിശക്</div>';
    }
}

function logout() {
    currentStudent = null;
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('attendanceSection').style.display = 'none';
    document.getElementById('regNumber').value = '';
    document.getElementById('password').value = '';
}
</script>

</body>
</html>
