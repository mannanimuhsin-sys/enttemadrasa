<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്റസ ഡാഷ്‌ബോർഡ് | Student Details</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        .container { max-width: 1100px; margin: 20px auto; background: #fff; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 25px; border-top: 6px solid #2c3e50; }
        
        h1 { text-align: center; color: #2c3e50; margin-bottom: 8px; font-size: 28px; font-weight: 900; letter-spacing: 0.4px; }
        .subtitle { text-align: center; color: #4d5563; margin-bottom: 20px; font-size: 15px; letter-spacing: 0.5px; }

        .summary-grid { display: grid; gap: 15px; grid-template-columns: repeat(3, minmax(0, 1fr)); margin-bottom: 22px; }
        .stat-card { border-radius: 16px; padding: 18px 20px; color: #fff; min-height: 110px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 10px 25px rgba(44,62,80,0.08); }
        .stat-card span { text-transform: uppercase; letter-spacing: 1px; font-size: 12px; opacity: 0.85; }
        .stat-card strong { display: block; font-size: 32px; margin-top: 10px; font-weight: 800; line-height: 1; }
        .stat-boys { background: linear-gradient(135deg, #2f80ed 0%, #3b82f6 100%); }
        .stat-girls { background: linear-gradient(135deg, #d63384 0%, #e83e8c 100%); }
        .stat-total { background: linear-gradient(135deg, #20c997 0%, #2ebf7f 100%); }

        .card-grid { display: none; gap: 16px; margin-bottom: 20px; }
        .class-card { border-radius: 18px; background: #ffffff; border: 1px solid rgba(44,62,80,0.08); box-shadow: 0 10px 30px rgba(15,23,42,0.06); padding: 18px; }
        .card-title { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
        .card-title span { font-size: 17px; font-weight: 800; color: #1f2937; }
        .card-total { font-size: 14px; color: #16a34a; font-weight: 700; }
        .card-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 14px; color: #475569; }
        .card-row strong { font-size: 16px; color: #111827; }
        .card-row.contact-row { gap: 10px; flex-wrap: wrap; }
        .card-row.contact-row a { color: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; border-radius: 10px; padding: 8px 12px; border: 1px solid #e2e8f0; background: #f8fafc; transition: 0.2s; }
        .card-row.contact-row a:hover { background: #eff6ff; }

        /* Admin Entry Box */
        .admin-section { background: #eef2f3; padding: 20px; border-radius: 12px; margin-bottom: 25px; display: none; border: 1px solid #d1d8db; }
        .admin-section h4 { margin-top: 0; color: #2c3e50; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .admin-section input { padding: 12px; border: 1px solid #ccc; border-radius: 8px; flex: 1; min-width: 150px; }
        .btn-add { background: #004d00; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; }

        /* Table Styling */
        .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { border: 1px solid #e6e8eb; padding: 14px 10px; text-align: center; vertical-align: middle; }
        th { background: #2c3e50; color: #fff; font-size: 13px; text-transform: uppercase; letter-spacing: 0.7px; }
        td { background: #ffffff; }
        .boys { color: #0b5ed7; font-weight: 700; }
        .girls { color: #d63384; font-weight: 700; }
        .total-cell { color: #198754; font-weight: 700; background: #f8fcf9; }
        .usthad-name { text-align: left; font-weight: 600; color: #333; padding-left: 15px; }

        /* Contact Icons - No Number Displayed */
        .contact-btns { display: flex; justify-content: center; align-items: center; gap: 12px; flex-wrap: wrap; }
        .contact-btns a, .admin-action { font-size: 22px; transition: 0.3s; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
        .contact-btns a:hover, .admin-action:hover { transform: translateY(-3px); }
        .admin-action { cursor: pointer; color: #0d6efd; padding: 8px; border-radius: 10px; background: #eef4ff; }
        .admin-action.delete-action { color: #dc3545; background: #fff0f0; }
        .call-icon { color: #0d6efd; }
        .whatsapp-icon { color: #25D366; }

        tfoot tr { background: #2c3e50; color: white; font-weight: bold; }
        tfoot td { border: none; padding: 15px; }
        
        .btn-back { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }

        @media(max-width: 992px) {
            .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        @media(max-width: 768px) {
            h1 { font-size: 22px; }
            .container { padding: 18px; }
            .summary-grid { grid-template-columns: 1fr; }
            .card-grid { display: grid; }
            .table-responsive { display: none; }
            .admin-section input { min-width: 100%; }
            .input-group { flex-direction: column; }
            .btn-add { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="mNameHead">മദ്റസ വിവരങ്ങൾ</h1>
    <div class="subtitle" id="mPlaceHead">Student Strength & Staff Details</div>

    <div class="summary-grid">
        <div class="stat-card stat-boys">
            <span>BOYS</span>
            <strong id="totalBoysCard">0</strong>
        </div>
        <div class="stat-card stat-girls">
            <span>GIRLS</span>
            <strong id="totalGirlsCard">0</strong>
        </div>
        <div class="stat-card stat-total">
            <span>TOTAL STUDENTS</span>
            <strong id="totalAllCard">0</strong>
        </div>
    </div>

    <div id="cardView" class="card-grid"></div>

    <div id="adminArea" class="admin-section">
        <h4>പുതിയ ക്ലാസ് വിവരങ്ങൾ ചേർക്കുക</h4>
        <div class="input-group">
            <input type="text" id="cName" placeholder="ക്ലാസ് (eg: I, II)">
            <input type="text" id="cDiv" placeholder="ഡിവിഷൻ (eg: A, B)">
            <input type="number" id="cBoys" placeholder="ആൺകുട്ടികൾ">
            <input type="number" id="cGirls" placeholder="പെൺകുട്ടികൾ">
            <input type="text" id="cUsthad" placeholder="ഉസ്താദിന്റെ പേര്">
            <input type="number" id="cPhone" placeholder="ഫോൺ നമ്പർ (WhatsApp)">
            <button class="btn-add" onclick="saveClass()">SAVE DATA</button>
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th rowspan="2">CLASS</th>
                    <th rowspan="2">DIV</th>
                    <th colspan="3">വിദ്യാർത്ഥികളുടെ എണ്ണം</th>
                    <th rowspan="2">CLASS USTHAD</th>
                    <th rowspan="2">CONTACT</th>
                </tr>
                <tr>
                    <th>BOYS</th>
                    <th>GIRLS</th>
                    <th>TOTAL</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
            <tfoot id="tableFoot">
                </tfoot>
        </table>
    </div>

    <a href="javascript:history.back()" class="btn-back"><i class="fa fa-arrow-left"></i> BACK</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
        authDomain: "enttemadrasa.firebaseapp.com",
        databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com",
        projectId: "enttemadrasa",
        storageBucket: "enttemadrasa.firebasestorage.app",
        appId: "1:623531881201:web:b863793340c3901cedaf50"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const mId = urlParams.get('id');
    const role = urlParams.get('role');

    // അഡ്മിൻ ആണെങ്കിൽ മാത്രം എൻട്രി ബോക്സ് കാണിക്കുക
    if(role === 'admin') {
        document.getElementById('adminArea').style.display = 'block';
    }

  // ഡാറ്റാബേസിൽ നിന്ന് വിവരങ്ങൾ എടുക്കുന്നു
    function loadData() {
        if (!mId) return;
        db.ref('madrasa_requests/' + mId).on('value', snap => {
            const data = snap.val();
            if(!data) return;

            document.getElementById('mNameHead').innerText = data.name;
            document.getElementById('mPlaceHead').innerText = data.place;

            let classes = data.classes || [];

            // --- സോർട്ടിങ് ലോജിക് ഇവിടെ തുടങ്ങുന്നു ---
            classes.sort((a, b) => {
                // റോമൻ അക്കങ്ങളോ (I, II) സാധാരണ അക്കങ്ങളോ (1, 2) ആയാലും തരംതിരിക്കാൻ വേണ്ടി
                const getVal = (name) => {
                    const roman = { "I":1, "II":2, "III":3, "IV":4, "V":5, "VI":6, "VII":7, "VIII":8, "IX":9, "X":10, "XI":11, "XII":12 };
                    return roman[name.toUpperCase()] || parseInt(name) || 0;
                };

                let valA = getVal(a.name);
                let valB = getVal(b.name);

                if (valA !== valB) {
                    return valA - valB; // ക്ലാസ് അടിസ്ഥാനത്തിൽ തരംതിരിക്കുന്നു (1, 2, 3...)
                } else {
                    // ക്ലാസ് ഒന്നാണെങ്കിൽ ഡിവിഷൻ (A, B, C) അടിസ്ഥാനത്തിൽ തരംതിരിക്കുന്നു
                    let divA = (a.div || "").toUpperCase();
                    let divB = (b.div || "").toUpperCase();
                    return divA.localeCompare(divB);
                }
            });
            // --- സോർട്ടിങ് ലോജിക് അവസാനിക്കുന്നു ---

            let html = "";
            let totalBoys = 0, totalGirls = 0, totalAll = 0;

            let cardHtml = "";

            classes.forEach((item, index) => {
                let b = parseInt(item.b) || 0;
                let g = parseInt(item.g) || 0;
                let rowTotal = b + g;

                totalBoys += b;
                totalGirls += g;
                totalAll += rowTotal;

                let divDisplay = (item.div && item.div.trim() !== "") ? `<b>${item.div}</b>` : "";

                html += `
                <tr>
                    <td><b>${item.name}</b></td>
                    <td>${divDisplay}</td>
                    <td class="boys">${b}</td>
                    <td class="girls">${g}</td>
                    <td class="total-cell">${rowTotal}</td>
                    <td class="usthad-name">${item.u}</td>
                    <td>
                        <div class="contact-btns">
                            <a href="tel:${item.p}" class="call-icon" title="Call"><i class="fa fa-phone-alt"></i></a>
                            ${role === 'admin' ? `
                            <span class="admin-action" title="Edit" onclick="editClass(${index})"><i class="fa fa-edit"></i></span>
                            <span class="admin-action delete-action" title="Delete" onclick="deleteClass(${index})"><i class="fa fa-trash"></i></span>` : ''}
                            <a href="https://wa.me/91${item.p}" class="whatsapp-icon" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                        </div>
                    </td>
                </tr>`;

                cardHtml += `
                <div class="class-card">
                    <div class="card-title">
                        <span>${item.name}${item.div ? ' (' + item.div + ')' : ''}</span>
                        <span class="card-total">${rowTotal} students</span>
                    </div>
                    <div class="card-row"><span>BOYS</span><strong>${b}</strong></div>
                    <div class="card-row"><span>GIRLS</span><strong>${g}</strong></div>
                    <div class="card-row"><span>TOTAL</span><strong>${rowTotal}</strong></div>
                    <div class="card-row"><span>USTHAD</span><strong>${item.u || '-'}</strong></div>
                    <div class="card-row contact-row">
                        <a href="tel:${item.p}" title="Call"><i class="fa fa-phone-alt"></i> CALL</a>
                        <a href="https://wa.me/91${item.p}" title="WhatsApp"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
                    </div>
                </div>`;
            });
            document.getElementById('tableBody').innerHTML = html;
            document.getElementById('cardView').innerHTML = cardHtml;
            document.getElementById('totalBoysCard').innerText = totalBoys;
            document.getElementById('totalGirlsCard').innerText = totalGirls;
            document.getElementById('totalAllCard').innerText = totalAll;
            
            document.getElementById('tableFoot').innerHTML = `
                <tr>
                    <td colspan="2">ആകെ (TOTAL)</td>
                    <td>${totalBoys}</td>
                    <td>${totalGirls}</td>
                    <td>${totalAll}</td>
                    <td colspan="2">TOTAL STRENGTH</td>
                </tr>`;
        });
    }
    // വിവരങ്ങൾ സേവ് ചെയ്യാൻ
    async function saveClass() {
        const name = document.getElementById('cName').value.trim();
        const div = document.getElementById('cDiv').value.trim();
        const b = document.getElementById('cBoys').value || 0;
        const g = document.getElementById('cGirls').value || 0;
        const u = document.getElementById('cUsthad').value.trim();
        const p = document.getElementById('cPhone').value.trim();

        if(!name || !u || !p) return alert("ദയവായി ക്ലാസ്, ഉസ്താദിന്റെ പേര്, ഫോൺ എന്നിവ നൽകുക!");

        try {
            const snap = await db.ref('madrasa_requests/' + mId + '/classes').once('value');
            let currentClasses = snap.val() || [];
            
            currentClasses.push({ name, div, b, g, u, p });

            await db.ref('madrasa_requests/' + mId + '/classes').set(currentClasses);
            
            // ഇൻപുട്ടുകൾ ക്ലിയർ ചെയ്യുന്നു
            document.getElementById('cName').value = "";
            document.getElementById('cDiv').value = "";
            document.getElementById('cBoys').value = "";
            document.getElementById('cGirls').value = "";
            document.getElementById('cUsthad').value = "";
            document.getElementById('cPhone').value = "";
            
            alert("വിവരങ്ങൾ വിജയകരമായി ചേർത്തു!");
        } catch (error) {
            alert("പിശക് സംഭവിച്ചു: " + error.message);
        }
    }

    // എഡിറ്റ് ചെയ്യാൻ
    async function editClass(index) {
        const snap = await db.ref('madrasa_requests/' + mId + '/classes/' + index).once('value');
        const data = snap.val();
        
        if(data) {
            document.getElementById('cName').value = data.name;
            document.getElementById('cDiv').value = data.div || "";
            document.getElementById('cBoys').value = data.b;
            document.getElementById('cGirls').value = data.g;
            document.getElementById('cUsthad').value = data.u;
            document.getElementById('cPhone').value = data.p;

            // എഡിറ്റ് ചെയ്യുമ്പോൾ ലിസ്റ്റിൽ നിന്ന് താൽക്കാലികമായി മാറ്റുന്നു
            await deleteClass(index, false);
            document.getElementById('cName').focus();
        }
    }

    // ഡിലീറ്റ് ചെയ്യാൻ
    async function deleteClass(index, ask = true) {
        if(!ask || confirm("ഈ ക്ലാസ് വിവരങ്ങൾ നീക്കം ചെയ്യട്ടെ?")) {
            const snap = await db.ref('madrasa_requests/' + mId + '/classes').once('value');
            let currentClasses = snap.val() || [];
            currentClasses.splice(index, 1);
            await db.ref('madrasa_requests/' + mId + '/classes').set(currentClasses);
        }
    }

    loadData();
</script>
</body>
</html>
