<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്റസ ഡാഷ്‌ബോർഡ് | Student Details</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; background-size: cover; background-attachment: fixed; padding: 15px; margin: 0; }
        .container { max-width: 1100px; margin: 20px auto; background: #fff; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 25px; border-top: 6px solid #2c3e50; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 8px; font-size: 28px; font-weight: 900; }
        .subtitle { text-align: center; color: #4d5563; margin-bottom: 20px; font-size: 15px; }

        .summary-grid { display: grid; gap: 15px; grid-template-columns: repeat(3, minmax(0, 1fr)); margin-bottom: 22px; }
        .stat-card { border-radius: 16px; padding: 18px 20px; color: #fff; min-height: 110px; display: flex; flex-direction: column; justify-content: space-between; }
        .stat-card strong { font-size: 32px; font-weight: 800; }
        .stat-boys { background: linear-gradient(135deg, #2f80ed, #3b82f6); }
        .stat-girls { background: linear-gradient(135deg, #d63384, #e83e8c); }
        .stat-total { background: linear-gradient(135deg, #20c997, #2ebf7f); }

        .admin-section { background: #eef2f3; padding: 20px; border-radius: 12px; margin-bottom: 25px; display: none; border: 1px solid #d1d8db; }
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .admin-section input { padding: 12px; border: 1px solid #ccc; border-radius: 8px; flex: 1; min-width: 150px; }
        .btn-add { background: #004d00; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }

        .table-responsive { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { border: 1px solid #e6e8eb; padding: 12px; text-align: center; }
        th { background: #2c3e50; color: #fff; font-size: 13px; }
        .boys { color: #0b5ed7; font-weight: 700; }
        .girls { color: #d63384; font-weight: 700; }
        
        .contact-btns { display: flex; justify-content: center; gap: 10px; }
        .admin-action { cursor: pointer; padding: 5px; border-radius: 5px; }
        .btn-back { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="mNameHead">മദ്റസ വിവരങ്ങൾ</h1>
    <div class="subtitle" id="mPlaceHead">Student Strength & Staff Details</div>

    <div class="summary-grid">
        <div class="stat-card stat-boys"><span>BOYS</span><strong id="totalBoysCard">0</strong></div>
        <div class="stat-card stat-girls"><span>GIRLS</span><strong id="totalGirlsCard">0</strong></div>
        <div class="stat-card stat-total"><span>TOTAL</span><strong id="totalAllCard">0</strong></div>
    </div>

    <div id="adminArea" class="admin-section">
        <h4>പുതിയ ക്ലാസ് വിവരങ്ങൾ ചേർക്കുക</h4>
        <div class="input-group">
            <input type="text" id="cName" placeholder="ക്ലാസ് (I, II...)">
            <input type="text" id="cDiv" placeholder="ഡിവിഷൻ (A, B...)">
            <input type="number" id="cBoys" placeholder="Boys">
            <input type="number" id="cGirls" placeholder="Girls">
            <input type="text" id="cUsthad" placeholder="ഉസ്താദിന്റെ പേര്">
            <input type="number" id="cPhone" placeholder="ഫോൺ നമ്പർ">
            <button class="btn-add" onclick="window.saveClass()">SAVE DATA</button>
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>CLASS</th><th>DIV</th><th>BOYS</th><th>GIRLS</th><th>TOTAL</th><th>USTHAD</th><th>CONTACT</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <a href="javascript:history.back()" class="btn-back"><i class="fa fa-arrow-left"></i> BACK</a>
</div>

<script type="module">
    import { supabase } from './supabase_client.js';

    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
        authDomain: "enttemadrasa.firebaseapp.com",
        projectId: "enttemadrasa",
        storageBucket: "enttemadrasa.firebasestorage.app",
        appId: "1:623531881201:web:b863793340c3901cedaf50"
    };

    // Initialize Firebase
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const firestore = firebase.firestore();
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const mId = urlParams.get('id') || localStorage.getItem("madrasaId");
    const role = urlParams.get('role') || localStorage.getItem("userRole");

    let editingIndex = -1;
    let currentClasses = [];

    if(!mId) {
        alert("മദ്റസ ഐഡി കണ്ടെത്തിയില്ല!");
        window.location.href = 'index.html';
    }

    if(role === 'admin') document.getElementById('adminArea').style.display = 'block';

    // --- ഡാറ്റ ലോഡ് ചെയ്യുന്ന ഫങ്ക്ഷൻ ---
    async function loadData() {
        console.log("Fetching data for:", mId);
        firestore.collection('madrasa_requests').doc(mId).onSnapshot(doc => {
            if (doc.exists) {
                renderUI(doc.data());
            } else {
                // ബാക്ക്അപ്പിനായി RTDB നോക്കുന്നു
                db.ref('madrasa_requests/' + mId).on('value', snap => {
                    if (snap.val()) renderUI(snap.val());
                });
            }
        });
    }

   function renderUI(data) {
    document.getElementById('mNameHead').innerText = (data.name || "മദ്റസ") + " (" + (data.reg || mId) + ")";
    document.getElementById('mPlaceHead').innerText = data.place || "";
    
    currentClasses = data.classes || [];
    currentClasses.sort((a,b) => (parseInt(a.name) || 0) - (parseInt(b.name) || 0));

    let html = "";
    let tb=0, tg=0, tt=0;

    currentClasses.forEach((item, index) => {
        let b = parseInt(item.b) || 0;
        let g = parseInt(item.g) || 0;
        let sum = b + g;
        tb += b; tg += g; tt += sum;

        html += `<tr>
            <td><b>${item.name}</b></td>
            <td>${item.div || ''}</td>
            <td class="boys">${b}</td>
            <td class="girls">${g}</td>
            <td><b>${sum}</b></td>
            <td style="text-align:left; padding-left:15px;">${item.u}</td>
            <td>
                <div class="contact-btns">
                    <a href="tel:${item.p}" class="call-icon" style="color: #0d6efd; font-size: 20px; margin-right: 10px;">
                        <i class="fa fa-phone-alt"></i>
                    </a>
                    
                    <a href="https://wa.me/91${item.p}" class="whatsapp-icon" style="color: #25D366; font-size: 22px; margin-right: 10px;">
                        <i class="fab fa-whatsapp"></i>
                    </a>

                    ${role === 'admin' ? `
                        <i class="fa fa-edit admin-action" style="color:#0d6efd; cursor:pointer; margin-right: 10px;" onclick="window.editClass(${index})"></i>
                        <i class="fa fa-trash admin-action" style="color:red; cursor:pointer;" onclick="window.deleteClass(${index})"></i>
                    ` : ''}
                </div>
            </td>
        </tr>`;
    });

    document.getElementById('tableBody').innerHTML = html;
    document.getElementById('totalBoysCard').innerText = tb;
    document.getElementById('totalGirlsCard').innerText = tg;
    document.getElementById('totalAllCard').innerText = tt;
}

    // --- സേവ് ചെയ്യുന്ന ഫങ്ക്ഷൻ ---
    async function saveClass() {
        const name = document.getElementById('cName').value.trim();
        const div = document.getElementById('cDiv').value.trim();
        const b = document.getElementById('cBoys').value;
        const g = document.getElementById('cGirls').value;
        const u = document.getElementById('cUsthad').value.trim();
        const p = document.getElementById('cPhone').value.trim();

        if(!name || !u || !p) return alert("ക്ലാസ്, ഉസ്താദ്, ഫോൺ എന്നിവ നിർബന്ധമാണ്!");

        const btn = document.querySelector('.btn-add');
        btn.disabled = true;
        btn.innerText = "Saving...";

        try {
            let updatedClasses = [...currentClasses];
            const newData = { name, div, b: parseInt(b)||0, g: parseInt(g)||0, u, p };

            if (editingIndex !== -1) {
                updatedClasses[editingIndex] = newData;
                editingIndex = -1;
            } else {
                updatedClasses.push(newData);
            }

            // ഫയർസ്റ്റോറിലും സുപാബേസിലും ഒരേസമയം സേവ് ചെയ്യുന്നു
            await firestore.collection('madrasa_requests').doc(mId).set({ classes: updatedClasses, reg: mId }, { merge: true });
            
            if (supabase) {
                await supabase.from('madrasa_requests').upsert({ reg: mId, classes: updatedClasses });
            }

            alert("വിജയകരമായി സേവ് ചെയ്തു!");
            document.querySelectorAll('.admin-section input').forEach(i => i.value = "");
            btn.innerText = "SAVE DATA";
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.disabled = false;
        }
    }

    // --- എഡിറ്റ് & ഡിലീറ്റ് ---
    window.editClass = (index) => {
        const item = currentClasses[index];
        document.getElementById('cName').value = item.name;
        document.getElementById('cDiv').value = item.div;
        document.getElementById('cBoys').value = item.b;
        document.getElementById('cGirls').value = item.g;
        document.getElementById('cUsthad').value = item.u;
        document.getElementById('cPhone').value = item.p;
        editingIndex = index;
        document.querySelector('.btn-add').innerText = "UPDATE DATA";
        window.scrollTo(0,0);
    };

    window.deleteClass = async (index) => {
        if(confirm("ഈ ക്ലാസ് നീക്കം ചെയ്യട്ടെ?")) {
            let updatedClasses = [...currentClasses];
            updatedClasses.splice(index, 1);
            await firestore.collection('madrasa_requests').doc(mId).set({ classes: updatedClasses }, { merge: true });
            alert("നീക്കം ചെയ്തു.");
        }
    };

    // വിൻഡോയിലേക്ക് ഫങ്ക്ഷനുകൾ നൽകുന്നു (onclick വർക്ക് ചെയ്യാൻ)
    window.saveClass = saveClass;

    loadData();
</script>
</body>
</html>
