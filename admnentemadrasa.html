<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background:#eef1f5;
  margin:0;
}

.header {
  background:#1e293b;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

.container {
  max-width:900px;
  margin:auto;
  padding:15px;
}

.search {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-bottom:15px;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:14px;
  margin-bottom:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.title {
  font-size:18px;
  font-weight:bold;
}

.meta {
  font-size:13px;
  color:#666;
  margin-top:4px;
}

.status {
  margin-top:6px;
  font-weight:bold;
}

.btn {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  margin:4px 4px 0 0;
  cursor:pointer;
}

.approve { background:#16a34a; color:#fff; }
.block { background:#f59e0b; color:#fff; }
.delete { background:#dc2626; color:#fff; }
.edit { background:#2563eb; color:#fff; }

</style>
</head>

<body>

<div class="header">SUPER ADMIN PANEL</div>

<div class="container">

<input type="text" id="search" class="search" placeholder="🔍 Search by Register Number..." onkeyup="filterData()">

<div id="list"></div>

</div>

<script>

const firebaseConfig = {
    apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
    authDomain: "enttemadrasa.firebaseapp.com",
    databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com",
    projectId: "enttemadrasa",
    storageBucket: "enttemadrasa.firebasestorage.app",
    appId: "1:623531881201:web:b863793340c3901cedaf50"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allData = [];

function loadData() {
    db.ref('madrasa_requests').on('value', snap => {
        allData = [];

        snap.forEach(c => {
            let d = c.val();
            d.id = c.key;
            allData.push(d);
        });

        // 🔥 Latest first (time based)
        allData.sort((a,b)=> new Date(b.createdAt) - new Date(a.createdAt));

        render(allData);
    });
}

function render(data) {
    let html = "";

    data.forEach(d => {
        html += `
        <div class="card">
            <div class="title">${d.name || "No Name"}</div>
            <div class="meta">📍 ${d.place || "-"}</div>
            <div class="meta">🆔 Reg: ${d.reg}</div>
            <div class="meta">⏱ ${d.createdAt || "-"}</div>

            <div class="status">Status: ${d.status || "pending"}</div>

            <button class="btn approve" onclick="approve('${d.id}')">Approve</button>
            <button class="btn block" onclick="block('${d.id}')">Block</button>
            <button class="btn edit" onclick="editData('${d.id}')">Edit</button>
            <button class="btn delete" onclick="deleteData('${d.id}')">Delete</button>
        </div>
        `;
    });

    document.getElementById('list').innerHTML = html;
}

function filterData() {
    let q = document.getElementById('search').value.toLowerCase();

    let filtered = allData.filter(d =>
        (d.reg || "").toLowerCase().includes(q)
    );

    render(filtered);
}

// ✅ APPROVE
function approve(id){
    db.ref('madrasa_requests/'+id).update({
        status:"approved"
    });
}

// 🚫 BLOCK
function block(id){
    db.ref('madrasa_requests/'+id).update({
        status:"blocked"
    });
}

// 🗑 DELETE
function deleteData(id){
    if(confirm("Delete this madrasa?")){
        db.ref('madrasa_requests/'+id).remove();
    }
}

// ✏️ EDIT
function editData(id){

    let name = prompt("Edit Madrasa Name:");
    let place = prompt("Edit Place:");
    let usthadPass = prompt("Edit Usthad Password:");
    let parentPass = prompt("Edit Parent Password:");

    if(name && place){
        db.ref('madrasa_requests/'+id).update({
            name:name,
            place:place,
            usthadPass:usthadPass,
            parentPass:parentPass
        });
    }
}

loadData();

</script>

</body>
</html>
