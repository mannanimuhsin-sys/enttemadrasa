<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | എന്‍റെ മദ്റസ</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --primary: #1a5f7a; --danger: #d9534f; --success: #5cb85c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        
        /* സെർച്ച് ബാർ */
        .search-container { position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 10px 0; }
        #searchInput { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }

        /* കാർഡുകൾ */
        .madrasa-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #ddd; position: relative; }
        .status-approved { border-left-color: var(--success); }
        .status-pending { border-left-color: orange; }
        .status-blocked { border-left-color: var(--danger); }

        .madrasa-info { display: flex; align-items: center; gap: 15px; }
        .madrasa-info img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; }
        .madrasa-details { flex: 1; }
        .pass-view { background: #f0f0f0; padding: 8px; border-radius: 5px; margin: 10px 0; font-family: monospace; font-size: 12px; }
        
        /* ബട്ടണുകൾ */
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; color: white; }
        .btn-approve { background: var(--success); }
        .btn-block { background: orange; }
        .btn-delete { background: var(--danger); }
        .btn-edit { background: #5bc0de; }

        /* എഡിറ്റ് മോഡൽ */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; margin: 15% auto; padding: 20px; width: 85%; border-radius: 10px; }
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;}
    </style>
</head>
<body>

<div class="header">
    <h2>SUPER ADMIN PANEL</h2>
    <p>മദ്റസ നിയന്ത്രണങ്ങൾ</p>
</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="രജിസ്റ്റർ നമ്പർ ഉപയോഗിച്ച് സെർച്ച് ചെയ്യുക..." onkeyup="searchMadrasa()">
</div>

<div id="madrasaList">
    <p style="text-align: center;">ഡാറ്റ ലോഡ് ചെയ്യുന്നു...</p>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>മദ്രസ വിവരങ്ങൾ എഡിറ്റ് ചെയ്യുക</h3>
        <p id="targetName" style="font-weight: bold;"></p>
        <label>പുതിയ മദ്രസ ഫോട്ടോ:</label>
        <input type="file" id="newPhoto" accept="image/*" onchange="previewEditImage(this)">
        <img id="editImagePrev" src="" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; display: none; margin: 10px auto; border: 2px solid #ddd;">
        <label>പുതിയ ഉസ്താദ് പാസ്‌വേഡ്:</label>
        <input type="text" id="newUsthadPass" placeholder="New Usthad Password">
        <label>പുതിയ പാരന്റ് പാസ്‌വേഡ്:</label>
        <input type="text" id="newParentPass" placeholder="New Parent Password">
        <div class="action-row">
            <button class="btn btn-approve" onclick="saveEdits()">SAVE</button>
            <button class="btn btn-delete" onclick="closeModal()">CANCEL</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
        authDomain: "enttemadrasa.firebaseapp.com",
        databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com",
        projectId: "enttemadrasa",
        storageBucket: "enttemadrasa.firebasestorage.app",
        appId: "1:623531881201:web:b863793340c3901cedaf50"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const firestore = firebase.firestore();

    let editingId = "";

    // പാസ്‌വേഡ് ഹാഷ് ചെയ്യാൻ
    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // മദ്റസകൾ ലോഡ് ചെയ്യാൻ (അവസാനം ചെയ്തത് മുകളിൽ വരാൻ reverse)
    function loadMadrasas() {
        db.ref('madrasa_requests').on('value', snap => {
            const listDiv = document.getElementById('madrasaList');
            listDiv.innerHTML = "";
            let madrasas = [];

            snap.forEach(child => {
                madrasas.push({ id: child.key, ...child.val() });
            });

            // സമയം അനുസരിച്ച് റിവേഴ്സ് ചെയ്യുക
            madrasas.reverse().forEach(data => {
                const photoSrc = data.photo || 'logo.png';
                const card = `
                    <div class="madrasa-card status-${data.status}" data-reg="${data.reg}">
                        <div class="madrasa-info">
                            <img src="${photoSrc}" alt="Madrasa Photo">
                            <div class="madrasa-details">
                                <h3>${data.name}</h3>
                                <div class="details">
                                    <b>REG:</b> ${data.reg} | <b>USER ID:</b> ${data.id}<br>
                                    <b>STATUS:</b> <span style="text-transform:uppercase">${data.status}</span>
                                </div>
                                <div class="pass-view">
                                    <b>Usthad Hash:</b> ${data.usthadPass ? data.usthadPass.substring(0,10)+'...' : 'N/A'}<br>
                                    <b>Parent Hash:</b> ${data.parentPass ? data.parentPass.substring(0,10)+'...' : 'N/A'}
                                </div>
                            </div>
                        </div>
                        <div class="action-row">
                            ${data.status !== 'approved' ? `<button class="btn btn-approve" onclick="updateStatus('${data.id}', 'approved')">APPROVE</button>` : ''}
                            ${data.status !== 'blocked' ? `<button class="btn btn-block" onclick="updateStatus('${data.id}', 'blocked')">BLOCK</button>` : `<button class="btn btn-approve" onclick="updateStatus('${data.id}', 'approved')">UNBLOCK</button>`}
                            <button class="btn btn-edit" onclick="openEditModal('${data.id}', '${data.name}')">EDIT</button>
                            <button class="btn btn-delete" onclick="deleteMadrasa('${data.id}')">DELETE</button>
                        </div>
                    </div>
                `;
                listDiv.innerHTML += card;
            });
        });
    }

    // സ്റ്റാറ്റസ് മാറ്റാൻ (Approve/Block)
    async function updateStatus(id, newStatus) {
        if(confirm(`ഈ മദ്റസ ${newStatus} ചെയ്യട്ടെ?`)) {
            try {
                await db.ref('madrasa_requests/' + id).update({ status: newStatus });
                await firestore.collection('madrasa_requests').doc(id).update({ status: newStatus }).catch(e=>console.log(e));
                if (window.supabaseClient) {
                    await window.supabaseClient.from('madrasa_requests').update({ status: newStatus }).eq('reg', id);
                }
            } catch (e) {
                console.error("Error updating status:", e);
                alert("അപ്ഡേറ്റ് ചെയ്യുന്നതിൽ പിശക് സംഭവിച്ചു!");
            }
        }
    }

    // മദ്റസ ഡിലീറ്റ് ചെയ്യാൻ
    async function deleteMadrasa(id) {
        if(confirm("മുന്നറിയിപ്പ്: ഈ മദ്റസയുടെ ഡാറ്റാബേസ് പൂർണ്ണമായും നീക്കം ചെയ്യപ്പെടും. തുടരണോ?")) {
            try {
                await db.ref('madrasa_requests/' + id).remove();
                await firestore.collection('madrasa_requests').doc(id).delete().catch(e=>console.log(e));
                if (window.supabaseClient) {
                    await window.supabaseClient.from('madrasa_requests').delete().eq('reg', id);
                }
            } catch (e) {
                console.error("Error deleting:", e);
                alert("ഡിലീറ്റ് ചെയ്യുന്നതിൽ പിശക് സംഭവിച്ചു!");
            }
        }
    }

    // പാസ്‌വേഡ് എഡിറ്റ് മോഡൽ തുറക്കാൻ
    function openEditModal(id, name) {
        editingId = id;
        document.getElementById('targetName').innerText = name;
        document.getElementById('editModal').style.display = 'block';
        // ഫോട്ടോ പ്രിവ്യൂ ക്ലിയർ ചെയ്യുക
        document.getElementById('editImagePrev').style.display = 'none';
        document.getElementById('editImagePrev').src = '';
        document.getElementById('newPhoto').value = '';
    }

    function previewEditImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('editImagePrev').src = e.target.result;
                document.getElementById('editImagePrev').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
        document.getElementById('newUsthadPass').value = "";
        document.getElementById('newParentPass').value = "";
        document.getElementById('newPhoto').value = "";
        document.getElementById('editImagePrev').style.display = 'none';
    }

    // പുതിയ എഡിറ്റ്സ് സേവ് ചെയ്യാൻ (ഫോട്ടോ, പാസ്‌വേഡ്)
    async function saveEdits() {
        const uPass = document.getElementById('newUsthadPass').value.trim();
        const pPass = document.getElementById('newParentPass').value.trim();
        const photoSrc = document.getElementById('editImagePrev').src;

        const updates = {};
        const supaUpdates = {};

        if (uPass) {
            updates.usthadPass = await hashPassword(uPass);
            supaUpdates.usthad_pass = updates.usthadPass;
        }
        if (pPass) {
            updates.parentPass = await hashPassword(pPass);
            supaUpdates.parent_pass = updates.parentPass;
        }
        if (photoSrc && photoSrc.startsWith('data')) {
            updates.photo = photoSrc;
            supaUpdates.photo = photoSrc;
        }

        if (Object.keys(updates).length === 0) {
            return alert("ഒരു മാറ്റവും നൽകിയിട്ടില്ല!");
        }

        try {
            await db.ref('madrasa_requests/' + editingId).update(updates);
            await firestore.collection('madrasa_requests').doc(editingId).update(updates).catch(e => console.log(e));
            if (window.supabaseClient && Object.keys(supaUpdates).length > 0) {
                await window.supabaseClient.from('madrasa_requests').update(supaUpdates).eq('reg', editingId);
            }
            alert("വിജയകരമായി മാറ്റി!");
            closeModal();
        } catch (e) {
            console.error("Save Error:", e);
            alert("മാറ്റങ്ങൾ സേവ് ചെയ്യുന്നതിൽ പിശക്!");
        }
    }

    // സെർച്ച് ഫംഗ്ഷൻ (രജിസ്റ്റർ നമ്പർ വെച്ച്)
    function searchMadrasa() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.getElementsByClassName('madrasa-card');

        for (let i = 0; i < cards.length; i++) {
            const reg = cards[i].getAttribute('data-reg').toLowerCase();
            if (reg.includes(input)) {
                cards[i].style.display = "";
            } else {
                cards[i].style.display = "none";
            }
        }
    }

    window.onload = loadMadrasas;
</script>

</body>
</html>
