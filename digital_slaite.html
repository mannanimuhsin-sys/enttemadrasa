<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ഡിജിറ്റൽ സ്ലേറ്റ്</title>
    <style>
        /* മൊബൈൽ സ്ക്രീൻ അനങ്ങാതിരിക്കാനും സൂം ആവാതിരിക്കാനും (Fixed UI) */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            touch-action: none;
            -webkit-text-size-adjust: none;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* മുകൾ ഭാഗം (Top Bar) */
        .top-bar {
            background-color: #0d0d0d;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #222;
            z-index: 10;
        }

        .title {
            font-size: 16px;
            font-weight: bold;
            color: #e0e0e0;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* കളർ ബട്ടണുകൾ */
        .color-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .color-btn.active {
            border-color: #ffc107;
            transform: scale(1.15);
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
        }

        .btn-green { background-color: #4CAF50; }
        .btn-red { background-color: #F44336; }
        .btn-white { background-color: #FFFFFF; }
        .btn-grey { background-color: #9E9E9E; }

        /* ടൂൾ ബട്ടണുകൾ */
        .tool-btn {
            background-color: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }

        .tool-btn.active {
            background-color: #ffc107;
            color: #000;
            border-color: #ffc107;
        }

        .btn-clear {
            background-color: #b71c1c;
            border-color: #b71c1c;
        }

        /* സ്ലേറ്റ് ഏരിയ */
        .slate-container {
            flex: 1;
            margin: 8px;
            position: relative;
            background-color: #121212;
            border: 2px solid #262626;
            border-radius: 12px;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            cursor: crosshair;
            touch-action: none;
        }

        /* പശ്ചാത്തലത്തിലെ അക്ഷരം (Trace Text) */
        .trace-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 160px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.15);
            z-index: 1;
            pointer-events: none;
            white-space: nowrap;
            direction: rtl;
        }

        /* കാറ്റഗറി ടാബുകൾ */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 4px 5px;
        }

        .tab-btn {
            background-color: #161616;
            color: #b3b3b3;
            border: 1px solid #262626;
            padding: 8px 16px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }

        .tab-btn.active {
            background-color: #007bff;
            color: #fff;
            border-color: #007bff;
            font-weight: bold;
        }

        /* അക്ഷരങ്ങളുടെ ലിസ്റ്റ് പാനൽ */
        .letter-panel {
            height: 85px;
            margin: 4px 8px 15px 8px;
            background-color: #080808;
            border-radius: 10px;
            border: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            overflow-x: auto;
            padding: 0 10px;
            gap: 10px;
            -webkit-overflow-scrolling: touch;
        }

        /* സ്ക്രോൾബാർ ഹൈഡ് ചെയ്യാൻ */
        .letter-panel::-webkit-scrollbar {
            display: none;
        }

        .letter-item {
            min-width: 65px;
            height: 65px;
            background-color: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.1s;
        }

        /* അറബി അക്ഷര രൂപം */
        .letter-item .char-text {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            direction: rtl;
        }

        /* താഴെയുള്ള മലയാളം ലേബൽ */
        .letter-item .sub-label {
            font-size: 11px;
            color: #8e8e93;
            margin-top: 2px;
            font-weight: normal;
        }

        .letter-item.active {
            background-color: #007bff;
            border: 2px solid #fff;
        }
        
        .letter-item.active .sub-label {
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="title">ഡിജിറ്റൽ സ്ലേറ്റ്</div>
        <div class="controls">
            <div class="color-btn btn-green" onclick="changeColor('#4CAF50', this)"></div>
            <div class="color-btn btn-red" onclick="changeColor('#F44336', this)"></div>
            <div class="color-btn btn-white active" onclick="changeColor('#FFFFFF', this)"></div>
            <div class="color-btn btn-grey" onclick="changeColor('#9E9E9E', this)"></div>
            
            <button class="tool-btn" id="eraserBtn" onclick="toggleEraser()">Eraser</button>
            <button class="tool-btn btn-clear" onclick="clearSlate()">Clear All</button>
        </div>
    </div>

    <div class="slate-container" id="slateContainer">
        <div class="trace-text" id="traceText"></div>
        <canvas id="slateCanvas"></canvas>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('arabic', this)">അറബി</button>
        <button class="tab-btn" onclick="switchTab('arabimalayalam', this)">അറബി-മലയാളം ലിപി</button>
        <button class="tab-btn" onclick="switchTab('words', this)">പദങ്ങൾ</button>
    </div>

    <div class="letter-panel" id="letterPanel"></div>

    <script>
        const canvas = document.getElementById('slateCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('slateContainer');
        const traceDisplay = document.getElementById('traceText');
        const letterPanel = document.getElementById('letterPanel');
        const eraserBtn = document.getElementById('eraserBtn');

        // നിങ്ങളുടെ പുസ്തകത്തിലെ ചിത്രങ്ങൾ പ്രകാരമുള്ള കൃത്യമായ ഡാറ്റാബേസ്
        const data = {
            arabic: [
                {char: "أ", label: ""}, {char: "ب", label: ""}, {char: "ت", label: ""}, {char: "ث", label: ""}, 
                {char: "ج", label: ""}, {char: "ح", label: ""}, {char: "خ", label: ""}, {char: "د", label: ""}, 
                {char: "ذ", label: ""}, {char: "ر", label: ""}, {char: "ز", label: ""}, {char: "س", label: ""}, 
                {char: "ش", label: ""}, {char: "ص", label: ""}, {char: "ض", label: ""}, {char: "ط", label: ""}, 
                {char: "ظ", label: ""}, {char: "ع", label: ""}, {char: "غ", label: ""}, {char: "ف", label: ""}, 
                {char: "ق", label: ""}, {char: "ك", label: ""}, {char: "ل", label: ""}, {char: "م", label: ""}, 
                {char: "ن", label: ""}, {char: "هـ", label: ""}, {char: "و", label: ""}, {char: "ي", label: ""}
            ],
            // നിങ്ങൾ നൽകിയ ചിത്രത്തിൽ (മെല്ലെഴുത്തുകൾ / Consonants) ഉള്ള അതേ അറബി-മലയാളം ലിപികൾ
            arabimalayalam: [
                {char: "ضۡ", label: "ള്‍"}, 
                {char: "ثٜ", label: "ഴ്‍"}, 
                {char: "رۡ", label: "റ്‍"}, 
                {char: "ڔّ", label: "റ്റ"}, 
                {char: "شۡ", label: "ശ്"}, 
                {char: "ثّۡ", label: "ഷ്"}, 
                {char: "سۡ", label: "സ്"}, 
                {char: "هـۡ", label: "ഹ്"},
                {char: "كۡ", label: "ക്"},
                {char: "كھۡ", label: "ഖ്"},
                {char: "ڴۡ", label: "ഗ്"},
                {char: "ڴھۡ", label: "ഘ്"},
                {char: "غُۡ", label: "ങ്"},
                {char: "چۡ", label: "ച്"},
                {char: "چھۡ", label: "ഛ്"},
                {char: "جۡ", label: "ജ്"},
                {char: "جھۡ", label: "ഝ്"},
                {char: "ڃۡ", label: "ഞ്"},
                {char: "ٻۡ", label: "പ്"},
                {char: "ٻھ", label: "ഫ്"},
                {char: "بۡ", label: "ബ്"},
                {char: "بھۡ", label: "ഭ്"},
                {char: "൲", label: "മ്"}
            ],
            words: [
                {char: "بَيْتٌ", label: "വീട്"}, {char: "قَلَمٌ", label: "പേന"}, 
                {char: "كِتَابٌ", label: "പുസ്തകം"}, {char: "مَدْرَسَةٌ", label: "മദ്രസ"}, 
                {char: "أُمِّي", label: "ഉമ്മ"}, {char: "أَبِي", label: "ഉപ്പ"}
            ]
        };

        let drawing = false;
        let currentColor = '#FFFFFF';
        let isEraser = false;
        let strokeWidth = 5;

        // കാൻവാസ് വലിപ്പം സ്ക്രീനിന് കൃത്യമാക്കുക
        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ഡ്രോയിങ് ലോജിക്കുകൾ
        function startDrawing(e) {
            drawing = true;
            ctx.beginPath();
            const pos = getPos(e);
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!drawing) return;
            const pos = getPos(e);
            ctx.lineWidth = isEraser ? 35 : strokeWidth;
            
            if (isEraser) {
                ctx.globalCompositeOperation = 'destination-out'; // വാട്ടർമാർക്ക് മായാതെ എഴുതിയത് മാത്രം മായ്ക്കും
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
            }
            
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function stopDrawing() {
            drawing = false;
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        // ഇവന്റുകൾ ഫിക്സഡ് ആക്കുക (സ്ക്രീൻ അനങ്ങാതിരിക്കാൻ)
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);

        canvas.addEventListener('touchstart', (e) => { startDrawing(e); }, { passive: true });
        canvas.addEventListener('touchmove', (e) => { draw(e); }, { passive: true });
        canvas.addEventListener('touchend', stopDrawing, { passive: true });

        // കളർ മാറ്റാൻ
        function changeColor(color, element) {
            currentColor = color;
            isEraser = false;
            eraserBtn.classList.remove('active');
            
            document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        // ഇറേസർ ടോഗിൾ
        function toggleEraser() {
            isEraser = !isEraser;
            if (isEraser) {
                eraserBtn.classList.add('active');
            } else {
                eraserBtn.classList.remove('active');
            }
        }

        // സ്ലേറ്റ് പൂർണ്ണമായി ക്ലിയർ ചെയ്യാൻ
        function clearSlate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // ടാബ് മാറ്റാൻ
        function switchTab(tabKey, element) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            loadLetters(tabKey);
        }

        // ലിസ്റ്റിൽ അക്ഷരങ്ങൾ ലോഡ് ചെയ്യാൻ
        function loadLetters(tabKey) {
            letterPanel.innerHTML = '';
            data[tabKey].forEach(itemData => {
                const item = document.createElement('div');
                item.className = 'letter-item';
                
                // അക്ഷര രൂപം
                const charSpan = document.createElement('span');
                charSpan.className = 'char-text';
                charSpan.textContent = itemData.char;
                item.appendChild(charSpan);
                
                // മലയാളം ലേബൽ
                if (itemData.label) {
                    const labelSpan = document.createElement('span');
                    labelSpan.className = 'sub-label';
                    labelSpan.textContent = itemData.label;
                    item.appendChild(labelSpan);
                }

                item.onclick = function() {
                    document.querySelectorAll('.letter-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    
                    traceDisplay.textContent = itemData.char;
                    
                    // വലിപ്പം ക്രമീകരിക്കൽ
                    if (itemData.char.length > 3) {
                        traceDisplay.style.fontSize = '80px';
                    } else {
                        traceDisplay.style.fontSize = '160px';
                    }
                    
                    clearSlate();
                };
                letterPanel.appendChild(item);
            });
        }

        // ആദ്യം ഓപ്പൺ ചെയ്യുമ്പോൾ ഡിഫോൾട്ടായി അറബി ലോഡ് ചെയ്യുക
        loadLetters('arabic');
    </script>
</body>
</html>
