<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>എന്‍റെ മദ്റസ | Smart Management</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --primary: #004d00; --gold: #d4af37; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .container { width: 100%; max-width: 500px; background: white; min-height: 100vh; margin: auto; position: relative; padding: 15px; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .secret-trigger { position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; color: #ddd; cursor: pointer; z-index: 100; }
        .page { display: none; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .profile-card { text-align: center; background: linear-gradient(135deg, #004d00, #002b00); color: white; padding: 30px 20px; border-radius: 20px; margin-bottom: 25px; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--gold); object-fit: cover; background: white; margin-bottom: 15px; }
        .m-reg { display: inline-block; background: var(--gold); color: black; padding: 4px 15px; border-radius: 50px; font-weight: bold; font-size: 13px; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-dash { background: white; color: var(--primary); border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; margin-top: 12px; text-decoration: none; border-radius: 10px; }
        #imagePrev { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: none; margin: 10px auto; border: 3px solid var(--gold); }
        .playstore-container { text-align: center; margin-top: 30px; padding: 15px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginPage" class="page active">
        <div class="secret-trigger" onclick="showPage('regPage')"><i class="fa fa-plus"></i></div>
        <div style="text-align: center; margin-top: 30px;">
            <img src="logo.png" style="width: 90px;">
            <h1 style="color: var(--primary); margin: 10px 0;">എന്‍റെ മദ്റസ</h1>
        </div>
        <input type="text" id="logReg" placeholder="മദ്റസ രജിസ്റ്റർ നമ്പർ">
        <input type="password" id="logPass" placeholder="പാസ്‌വേഡ്">
        <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">LOGIN</button>
        
        <div id="pwaInstallArea" class="playstore-container" style="display: none;">
            <div id="androidInstall" style="display: none;">
                <p style="font-size: 12px; color: #888; margin-bottom: 10px;">മികച്ച അനുഭവത്തിനായി ആപ്പ് ഇൻസ്റ്റാൾ ചെയ്യൂ</p>
                <button class="btn" id="pwaInstallBtn" style="background: #000; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; margin: auto;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" style="height: 30px;">
                </button>
            </div>
            <div id="iosInstall" style="display: none; background: #e9ecef; padding: 15px; border-radius: 10px; border: 1px solid #ddd; text-align: left;">
                <p style="font-size: 14px; color: #333; margin: 0; font-weight: bold;">ഐഫോണിൽ ഇൻസ്റ്റാൾ ചെയ്യാൻ:</p>
                <p style="font-size: 13px; color: #666; margin: 5px 0;">താഴെയുള്ള 'Share' ബട്ടൺ ക്ലിക്ക് ചെയ്ത് 'Add to Home Screen' സെലക്ട് ചെയ്യുക.</p>
            </div>
        </div>
    </div>

    <div id="regPage" class="page">
        <h2 style="text-align: center; color: var(--primary);">പുതിയ രജിസ്‌ട്രേഷൻ</h2>
        <div style="text-align: center;">
            <img id="imagePrev" src="">
            <label for="mPhoto" style="cursor: pointer; color: var(--primary); font-weight: bold; display: block; margin: 10px 0;">
                <i class="fa fa-camera"></i> മദ്റസ ഫോട്ടോ ചേർക്കുക
            </label>
            <input type="file" id="mPhoto" accept="image/*" style="display: none;" onchange="previewImage(this)">
        </div>
        <input type="text" id="rName" placeholder="മദ്റസയുടെ പേര്">
        <input type="text" id="rPlace" placeholder="സ്ഥലം">
        <input type="text" id="rReg" placeholder="മദ്റസ രജിസ്റ്റർ നമ്പർ">
        <input type="text" id="rUser" placeholder="User ID">
        <input type="password" id="rUsthad" placeholder="ഉസ്താദ് പാസ്‌വേഡ്">
        <input type="password" id="rParent" placeholder="പാരന്റ് പാസ്‌വേഡ്">
        <button class="btn btn-primary" id="regBtn" onclick="register()">REGISTER NOW</button>
        <button class="btn" style="background: #ccc;" onclick="showPage('loginPage')">BACK</button>
    </div>

    <div id="portalPage" class="page">
        <div id="profileArea"></div>
        <button class="btn btn-dash" onclick="openDashboard()"><i class="fa fa-chart-line"></i> DASHBOARD</button>
        <button class="btn btn-dash" id="btnPayment" onclick="openPaymentPortal()"><i class="fa fa-file-invoice-dollar"></i> PAYMENTS</button>
        <button class="btn btn-dash" onclick="openIDPortal()"><i class="fa fa-id-badge"></i> ID CARD PORTAL</button>
        <button class="btn btn-dash" onclick="openQuizPortal()"><i class="fa fa-question-circle"></i> SPECIAL QUIZ</button>
      <button id="btn_salah" class="btn btn-dash" onclick="openSalahTracker()" style="display: none; background: #e8f5e9; border: 2px solid #2e7d32;">
    <i class="fa fa-mosque"></i> SALAH TRACKER (Leaderboard)
</button>

<div id="adminSalahSection" style="display: none;">
    <button class="btn btn-dash" onclick="openAdminSalah()" style="background: #2e7d32; color: white; border:none;">
        <i class="fa fa-check-double"></i> MARK SALAH (Admin)
    </button>
</div>
        <div id="adminPanelSection" style="display: none; margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px;">
            <p style="text-align:center; font-size:12px; color:#666;">ADMIN CONTROLS</p>
            <button class="btn btn-dash" onclick="window.location.href='payment_admin.html?id='+currentId" style="background: #2e7d32; color: white; border:none;">MANAGE PAYMENTS</button>
            <button class="btn btn-dash" onclick="window.location.href='settings.html?id='+currentId" style="background: #607d8b; color: white; border:none;">SETTINGS</button>
        </div>
        <button class="btn" style="background: #f8d7da; color: #721c24; margin-top: 40px;" onclick="logout()">LOGOUT</button>
    </div>

    <div id="pendingPage" class="page">
        <div style="text-align: center; padding: 50px 20px;">
            <i class="fa fa-clock" style="font-size: 60px; color: orange;"></i>
            <h3>അപ്രൂവൽ കാത്തിരിക്കുന്നു</h3>
            <button class="btn btn-primary" onclick="location.reload()">BACK</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
        authDomain: "enttemadrasa.firebaseapp.com",
        databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com",
        projectId: "enttemadrasa",
        storageBucket: "enttemadrasa.firebasestorage.app",
        appId: "1:623531881201:web:b863793340c3901cedaf50"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentId = "", currentRole = "", deferredPrompt;

    const isIos = () => /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
    const isStandalone = () => ('standalone' in window.navigator) && (window.navigator.standalone);

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if (!isIos()) {
            document.getElementById('pwaInstallArea').style.display = 'block';
            document.getElementById('androidInstall').style.display = 'block';
        }
    });

    if (isIos() && !isStandalone()) {
        document.getElementById('pwaInstallArea').style.display = 'block';
        document.getElementById('iosInstall').style.display = 'block';
    }

    document.getElementById('pwaInstallBtn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('pwaInstallArea').style.display = 'none';
            deferredPrompt = null;
        }
    });

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const maxWidth = 500; 
                    const scale = maxWidth / img.width;
                    canvas.width = maxWidth; canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    document.getElementById('imagePrev').src = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('imagePrev').style.display = 'block';
                };
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function register() {
        const regNo = document.getElementById('rReg').value.trim();
        const uId = document.getElementById('rUser').value.trim();
        const name = document.getElementById('rName').value.trim();
        const place = document.getElementById('rPlace').value.trim();
        const uPass = document.getElementById('rUsthad').value.trim();
        const pPass = document.getElementById('rParent').value.trim();
        const photo = document.getElementById('imagePrev').src;
        const regBtn = document.getElementById('regBtn');

        if (!regNo || !uId || !name || !uPass || !pPass) return alert("വിവരങ്ങൾ നൽകുക!");
        regBtn.disabled = true; regBtn.innerText = "CHECKING...";

        try {
            const regSnap = await db.ref('madrasa_requests').orderByChild('reg').equalTo(regNo).once('value');
            if (regSnap.exists()) { regBtn.disabled = false; regBtn.innerText = "REGISTER NOW"; return alert("ഈ രജിസ്റ്റർ നമ്പറിൽ മദ്റസ നിലവിലുണ്ട്!"); }

            await db.ref('madrasa_requests/' + uId).set({
                name, place, reg: regNo, photo: photo.startsWith('data') ? photo : "",
                usthadPass: uPass, parentPass: pPass, status: "pending", createdAt: new Date().toISOString()
            });
            alert("വിജയിച്ചു! അപ്രൂവലിനായി കാത്തിരിക്കുക."); location.reload();
        } catch (e) { alert("Error: " + e.message); regBtn.disabled = false; regBtn.innerText = "REGISTER NOW"; }
    }

    async function handleLogin() {
        const reg = document.getElementById('logReg').value.trim();
        const pass = document.getElementById('logPass').value.trim();
        if(!reg || !pass) return alert("വിവരങ്ങൾ നൽകുക");

        db.ref('madrasa_requests').orderByChild('reg').equalTo(reg).once('value', snap => {
            let found = null;
            snap.forEach(c => {
                const d = c.val();
                if(d.usthadPass === pass) { found = d; currentId = c.key; currentRole = "admin"; }
                else if(d.parentPass === pass) { found = d; currentId = c.key; currentRole = "parent"; }
            });

            if(found) {
                if(found.status !== 'approved') return showPage('pendingPage');
                localStorage.setItem("madrasaId", currentId);
                localStorage.setItem("userRole", currentRole);
                loadProfile(found);
            } else { alert("തെറ്റായ വിവരം!"); }
        });
    }

  function loadProfile(d) {
        document.getElementById('profileArea').innerHTML = `
            <div class="profile-card"><img src="${d.photo || 'logo.png'}" class="profile-img">
            <h1 style="margin:0; font-size:22px;">${d.name}</h1>
            <div class="m-reg">REG NO: ${d.reg}</div></div>`;

        // സെറ്റിംഗ്സ് അനുസരിച്ച് സലാഹ് ബട്ടൺ നിയന്ത്രിക്കാൻ
        db.ref('settings/' + currentId).on('value', snap => {
            const settings = snap.val() || {};
            const sBtn = document.getElementById('btn_salah');
            
            // സെറ്റിംഗ്സിൽ 'salah' ഓൺ ആണെങ്കിൽ മാത്രം ബട്ടൺ കാണിക്കും
            if (settings.salah === true) {
                sBtn.style.display = 'flex';
            } else {
                sBtn.style.display = 'none';
            }
        });

        if(currentRole === 'admin') {
            document.getElementById('adminPanelSection').style.display = 'block';
            document.getElementById('adminSalahSection').style.display = 'block'; // അഡ്മിന് മാർക്ക് ചെയ്യാനുള്ള ബട്ടൺ
            document.getElementById('btnPayment').style.display = 'none';
        }
        showPage('portalPage');
    }
if(currentRole === 'admin') {
    document.getElementById('adminPanelSection').style.display = 'block';
    document.getElementById('adminSalahSection').style.display = 'block'; // ഇത് പുതിയത്
    document.getElementById('btnPayment').style.display = 'none';
}
    function openDashboard() { window.location.href = `https://mannanimuhsin-sys.github.io/madrasa/dashbord?id=${currentId}&role=${currentRole}`; }
    
    // ശരിയാക്കിയ ലിങ്ക് ലോജിക്
    function openIDPortal() { 
        if(currentRole === "admin") {
            // അഡ്മിൻ പാനലിലേക്ക് പോകാനുള്ള ശരിയായ ലിങ്ക്
            window.location.href = `https://mannanimuhsin-sys.github.io/madrasa/admin_id_portal.html?id=${currentId}`;
        } else {
            // രക്ഷിതാക്കൾക്കുള്ള ലിങ്ക്
            window.location.href = `https://mannanimuhsin-sys.github.io/madrasa/student_id.html?mid=${currentId}`;
        }
    }

    function openQuizPortal() { window.location.href = (currentRole === "admin") ? `admin_quiz.html?id=${currentId}` : `student_quiz.html?mid=${currentId}`; }
    function openPaymentPortal() { window.location.href = (currentRole === 'admin') ? `payment_admin.html?id=${currentId}` : `payment_login.html?id=${currentId}`; }
    function logout() { localStorage.clear(); location.reload(); }

    window.onload = () => {
        const sid = localStorage.getItem("madrasaId");
        if(sid) {
            currentId = sid; currentRole = localStorage.getItem("userRole");
            db.ref('madrasa_requests/' + sid).once('value', snap => { if(snap.exists()) loadProfile(snap.val()); });
        }
    };
    // രക്ഷിതാക്കൾക്കും കുട്ടികൾക്കും ലീഡർബോർഡ് കാണാൻ
function openSalahTracker() { 
    window.location.href = `parents_leaderboard.html?mid=${currentId}`; 
}

// ഉസ്താദുമാർക്ക് മാർക്ക് രേഖപ്പെടുത്താൻ
function openAdminSalah() { 
    window.location.href = `admin_salah.html?id=${currentId}`; 
}
</script>
</body>
</html>
