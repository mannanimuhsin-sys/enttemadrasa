<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>എന്‍റെ മദ്റസ | Smart Management</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --primary: #004d00; --gold: #d4af37; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .container { width: 100%; max-width: 500px; background: white; min-height: 100vh; margin: auto; position: relative; padding: 15px; box-sizing: border-box; }
        .page { display: none; animation: fadeIn 0.4s; }
        .active { display: block !important; }

        /* ✅ പ്ലസ് ബട്ടൺ - ഇപ്പോൾ പച്ച നിറത്തിൽ വരും */
        #plusBtn { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            width: 55px; 
            height: 55px; 
            background: #004d00 !important; /* പച്ച നിറം */
            border: none; 
            border-radius: 50%;
            font-size: 24px; 
            color: white !important; /* വെള്ള പ്ലസ് */
            cursor: pointer; 
            z-index: 999999 !important; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        /* ബാക്കി പഴയ സ്റ്റൈലുകൾ */
        .profile-card { text-align: center; background: linear-gradient(135deg, #004d00, #002b00); color: white; padding: 30px 20px; border-radius: 20px; margin-bottom: 25px; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--gold); object-fit: cover; background: white; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-dash { background: white; color: var(--primary); border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; margin-top: 12px; text-decoration: none; border-radius: 10px; font-weight: bold; }
        #imagePrev { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: none; margin: 10px auto; border: 3px solid var(--gold); }
    </style>
</head>
<body>

<button id="plusBtn" onclick="showPage('regPage')"><i class="fa fa-plus"></i></button>

<div class="container">
    <div id="loginPage" class="page active">
        <div style="text-align: center; margin-top: 40px;">
            <img src="logo.png" style="width: 90px;">
            <h1 style="color: var(--primary); margin: 10px 0;">എന്‍റെ മദ്റസ</h1>
        </div>
        <input type="text" id="logReg" placeholder="മദ്റസ രജിസ്റ്റർ നമ്പർ">
        <input type="password" id="logPass" placeholder="പാസ്‌വേഡ്">
        <button class="btn btn-primary" onclick="handleLogin()">LOGIN</button>
    </div>

    <div id="regPage" class="page">
        <h2 style="text-align: center; color: var(--primary);">പുതിയ രജിസ്‌ട്രേഷൻ</h2>
        <div style="text-align: center;">
            <img id="imagePrev" src="">
            <label for="mPhoto" style="cursor: pointer; color: var(--primary); font-weight: bold; display: block; margin: 10px 0;">
                <i class="fa fa-camera"></i> മദ്റസ ഫോട്ടോ ചേർക്കുക
            </label>
            <input type="file" id="mPhoto" accept="image/*" style="display: none;" onchange="previewImage(this)">
        </div>
        <input type="text" id="rName" placeholder="മദ്റസയുടെ പേര്">
        <input type="text" id="rPlace" placeholder="സ്ഥലം">
        <input type="text" id="rReg" placeholder="മദ്റസ രജിസ്റ്റർ നമ്പർ">
        <input type="text" id="rUser" placeholder="User ID">
        <input type="password" id="rUsthad" placeholder="ഉസ്താദ് പാസ്‌വേഡ്">
        <input type="password" id="rParent" placeholder="പാരന്റ് പാസ്‌വേഡ്">
        <button class="btn btn-primary" id="regBtn" onclick="register()">REGISTER NOW</button>
        <button class="btn" style="background: #ccc;" onclick="showPage('loginPage')">BACK</button>
    </div>

    <div id="portalPage" class="page">
        <div id="profileArea"></div>
        <button class="btn btn-dash" onclick="openDashboard()"><i class="fa fa-chart-line"></i> DASHBOARD</button>
        <button class="btn btn-dash" onclick="openIDPortal()"><i class="fa fa-id-badge"></i> ID CARD PORTAL</button>
        <button class="btn" style="background: #f8d7da; color: #721c24; margin-top: 40px;" onclick="logout()">LOGOUT</button>
    </div>

    <div id="pendingPage" class="page">
        <div style="text-align: center; padding: 50px 20px;">
            <i class="fa fa-clock" style="font-size: 60px; color: orange;"></i>
            <h3>അപ്രൂവൽ കാത്തിരിക്കുന്നു</h3>
            <button class="btn btn-primary" onclick="location.reload()">BACK</button>
        </div>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
        authDomain: "enttemadrasa.firebaseapp.com",
        databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com",
        projectId: "enttemadrasa",
        storageBucket: "enttemadrasa.firebasestorage.app",
        appId: "1:623531881201:web:b863793340c3901cedaf50"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const IMGBB_API_KEY = "A0ec42450bb0e87699896f33dbd7c471"; 

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        
        // പ്ലസ് ബട്ടൺ കാണിക്കേണ്ട ലോജിക്
        const plusBtn = document.getElementById('plusBtn');
        if (pageId === 'loginPage' || pageId === 'regPage') {
            plusBtn.style.display = 'flex';
        } else {
            plusBtn.style.display = 'none';
        }
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('imagePrev').src = e.target.result;
                document.getElementById('imagePrev').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append('image', file);
        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: 'POST', body: formData
            });
            const result = await response.json();
            return result.data.url;
        } catch (e) { return ""; }
    }

    async function register() {
        const regBtn = document.getElementById('regBtn');
        const rName = document.getElementById('rName').value.trim();
        const rPlace = document.getElementById('rPlace').value.trim();
        const regNo = document.getElementById('rReg').value.trim();
        const uId = document.getElementById('rUser').value.trim();
        const uPass = document.getElementById('rUsthad').value.trim();
        const pPass = document.getElementById('rParent').value.trim();
        const photoFile = document.getElementById('mPhoto').files[0];

        if (!regNo || !uId || !uPass) return alert("വിവരങ്ങൾ നൽകുക!");

        regBtn.disabled = true;
        regBtn.innerText = "Processing...";

        let photoUrl = "";
        if (photoFile) photoUrl = await uploadToImgBB(photoFile);

        const uHash = await hashPassword(uPass);
        const pHash = await hashPassword(pPass);

        db.ref('madrasa_requests/' + uId).set({
            name: rName, place: rPlace, reg: regNo, photo: photoUrl,
            usthadPass: uHash, parentPass: pHash, status: "pending",
            createdAt: new Date().toISOString()
        }).then(() => { alert("വിജയിച്ചു!"); location.reload(); });
    }

    async function handleLogin() {
        const reg = document.getElementById('logReg').value.trim();
        const pass = document.getElementById('logPass').value.trim();
        const passHash = await hashPassword(pass);

        db.ref('madrasa_requests').orderByChild('reg').equalTo(reg).once('value', snap => {
            let found = null;
            let currentId = "";
            snap.forEach(c => {
                const d = c.val();
                if(d.usthadPass === passHash) { found = d; currentId = c.key; currentRole = "admin"; }
                else if(d.parentPass === passHash) { found = d; currentId = c.key; currentRole = "parent"; }
            });
            if(found) {
                if(found.status !== 'approved') return showPage('pendingPage');
                localStorage.setItem("madrasaId", currentId);
                localStorage.setItem("userRole", currentRole);
                loadProfile(found);
            } else { alert("തെറ്റായ വിവരം!"); }
        });
    }

    function loadProfile(d) {
        document.getElementById('plusBtn').style.display = 'none';
        document.getElementById('profileArea').innerHTML = `
            <div class="profile-card"><img src="${d.photo || 'logo.png'}" class="profile-img">
            <h1 style="margin:0;">${d.name}</h1>
            <div class="m-reg">REG NO: ${d.reg}</div></div>`;
        showPage('portalPage');
    }

    function logout() { localStorage.clear(); location.reload(); }

    window.onload = () => {
        const sid = localStorage.getItem("madrasaId");
        if(sid) {
            db.ref('madrasa_requests/' + sid).once('value', snap => { if(snap.exists()) loadProfile(snap.val()); });
        }
    };
</script>
</body>
</html>
