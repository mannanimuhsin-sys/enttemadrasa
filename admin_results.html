<!DOCTYPE html>
<html>
<head>
    <title>Quiz Results & Winner Poster</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #eee; padding: 20px; text-align: center; }
        .result-container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; }
        
        /* Winner List Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #004d00; color: white; }

        /* POSTER DESIGN */
        #posterArea { 
            display: none; 
            width: 600px; 
            height: 800px; 
            margin: 30px auto; 
            background: linear-gradient(135deg, #004d00, #002b00); 
            border: 8px solid #d4af37; 
            position: relative;
            color: white;
            padding: 20px;
            border-radius: 10px;
        }
        .winner-slot { display: inline-block; width: 30%; margin: 10px; vertical-align: top; }
        .winner-slot img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #d4af37; object-fit: cover; }
        .rank { font-weight: bold; font-size: 20px; color: #d4af37; margin-top: 10px; }
        
        .btn-publish { background: #ff9800; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="result-container">
    <h2>🏆 ക്വിസ് വിജയികൾ</h2>
    <p>മൈക്രോ സെക്കന്റ് കണക്കാക്കിയുള്ള ഫലം താഴെ കാണാം</p>
    
    <table id="resultsTable">
        <thead>
            <tr>
                <th>Rank</th>
                <th>വിദ്യാർത്ഥി</th>
                <th>ക്ലാസ്</th>
                <th>സ്കോർ</th>
                <th>സബ്മിറ്റ് സമയം</th>
            </tr>
        </thead>
        <tbody id="resultBody">
            </tbody>
    </table>

    <button class="btn-publish" onclick="generatePoster()">PUBLISH WINNER POSTER</button>
</div>

<div id="posterArea">
    <h1 style="color:#d4af37; margin-bottom: 5px;">CONGRATULATIONS</h1>
    <h3 id="posterHeading">SPECIAL DAY QUIZ WINNERS</h3>
    <hr style="border:1px solid #d4af37; width: 50%;">
    
    <div id="winnerDisplays" style="margin-top: 50px;">
        </div>

    <div style="position: absolute; bottom: 30px; width: 100%; text-align: center;">
        <h2 id="mNameFooter">Madrasa Name</h2>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
        authDomain: "enttemadrasa.firebaseapp.com",
        databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com",
        projectId: "enttemadrasa",
        storageBucket: "enttemadrasa.firebasestorage.app",
        appId: "1:623531881201:web:b863793340c3901cedaf50"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const firestore = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    const mID = urlParams.get('id');

    let topWinners = [];

    // 1. ഫലങ്ങൾ ലോഡ് ചെയ്യുന്നു
    function loadResults() {
        // ✅ ആദ്യം ഫയർസ്റ്റോറിലെ തത്സമയ മാറ്റങ്ങൾ നോക്കുന്നു
        firestore.collection('quiz_submissions').doc(mID).collection('students').onSnapshot(snap => {
            let data = [];
            snap.forEach(doc => {
                data.push(doc.data());
            });

            if (data.length === 0) {
                // ഫയർസ്റ്റോറിൽ ഡാറ്റാ ഇല്ലെങ്കിൽ മാത്രം RTDB നോക്കുന്നു
                db.ref('quiz_submissions/' + mID).once('value', rSnap => {
                    let rData = [];
                    rSnap.forEach(child => {
                        const res = child.val();
                        if (res && typeof res.score === 'number') rData.push(res);
                    });
                    processAndRender(rData);
                });
            } else {
                processAndRender(data);
            }
        });
    }

    function processAndRender(data) {
        data.sort((a, b) => {
            const scoreA = a.score ?? 0;
            const scoreB = b.score ?? 0;
            if (scoreA !== scoreB) return scoreB - scoreA;
            
            // Time logic
            let timeA = a.submitTime;
            let timeB = b.submitTime;
            
            // Handle Firestore Timestamp vs RTDB Number
            if (timeA && typeof timeA.toMillis === 'function') timeA = timeA.toMillis();
            if (timeB && typeof timeB.toMillis === 'function') timeB = timeB.toMillis();
            
            return (timeA || 0) - (timeB || 0);
        });

        topWinners = data.slice(0, 3);
        renderTable(data);
    }

    function formatSubmitTime(ts) {
        if (!ts) return '';
        const d = new Date(ts);
        const h = String(d.getHours()).padStart(2, '0');
        const m = String(d.getMinutes()).padStart(2, '0');
        const s = String(d.getSeconds()).padStart(2, '0');
        const ms = String(d.getMilliseconds()).padStart(3, '0');
        return `${h}:${m}:${s}.${ms}`;
    }

    // 2. ടേബിൾ നിർമ്മാണം
    function renderTable(data) {
        const body = document.getElementById('resultBody');
        body.innerHTML = data.map((r, i) => `
            <tr>
                <td>${i+1}</td>
                <td>${r.studentName} (${r.regNo})</td>
                <td>${r.class}</td>
                <td>${r.score}/${r.totalQuestions || ''}</td>
                <td>${formatSubmitTime(r.submitTime)}</td>
            </tr>
        `).join('');
    }

    async function submitAnswer() {
        if(topWinners.length === 0) return alert("വിജയികൾ ലഭ്യമല്ല!");

        document.getElementById('posterArea').style.display = 'block';
        const display = document.getElementById('winnerDisplays');
        
        display.innerHTML = topWinners.map((w, i) => `
            <div class="winner-slot">
                <div class="rank">${i+1}<sup>st</sup> Place</div>
                <img src="${w.photo || 'https://via.placeholder.com/100'}">
                <h3 style="margin: 10px 0 5px 0;">${w.studentName}</h3>
                <p style="font-size: 12px; margin: 0;">Class: ${w.class}</p>
                <p style="font-size: 11px; color: #d4af37;">Mentor: ${w.mentor}</p>
            </div>
        `).join('');

        // മദ്റസ പേര് ഫൂട്ടറിൽ ചേർക്കാൻ
        firestore.collection('madrasa_requests').doc(mID).get().then(doc => {
            if (doc.exists) {
                document.getElementById('mNameFooter').innerText = doc.data().name;
            } else {
                db.ref('madrasa_requests/' + mID).once('value', s => {
                    if(s.exists()) document.getElementById('mNameFooter').innerText = s.val().name;
                });
            }
        });
    }

    loadResults();
</script>

</body>
</html>
