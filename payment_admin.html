<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്റസ പെയ്‌മെന്റ് മാസ്റ്റർ അഡ്മിൻ</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --primary: #004d00; --bg: #f0f2f5; --blue: #3498db; --green: #27ae60; --orange: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: auto; }
        
        .main-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .title-area { text-align: center; margin-bottom: 20px; color: var(--primary); }
        
        /* Form Styling */
        .form-group { margin-bottom: 12px; }
        label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 12px; font-size: 15px; box-sizing: border-box; background: #fff; }
        input:focus { border-color: var(--primary); outline: none; }
        
        .btn { padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: var(--primary); color: white; }
        
        /* Stats Box Styling (Your Screenshot Style) */
        .stats-grid { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
        .stat-box { padding: 25px 15px; border-radius: 15px; color: white; text-align: center; position: relative; overflow: hidden; }
        .stat-box p { margin: 0; font-size: 16px; font-weight: 500; opacity: 0.9; }
        .stat-box h2 { margin: 10px 0 0; font-size: 32px; font-weight: 800; }
        .bg-blue { background: var(--blue); }
        .bg-green { background: var(--green); }
        .bg-orange { background: var(--orange); }

        /* Table Design */
        .scroll-area { max-height: 400px; overflow-y: auto; border-radius: 12px; border: 1px solid #eee; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 13px; color: #777; position: sticky; top: 0; z-index: 10; }
        td { padding: 14px 12px; border-bottom: 1px solid #f1f1f1; font-size: 14px; }
        
        .status-badge { padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .bg-paid { background: #e8f5e9; color: #2e7d32; }
        .bg-pending { background: #ffebee; color: #c62828; }
        
        .btn-change { background: #f0f0f0; border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; color: #555; }
        
        .header-section { display: flex; align-items: center; gap: 10px; font-weight: bold; margin-bottom: 15px; font-size: 18px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="title-area">
        <h2 style="margin:0;"><i class="fa fa-university"></i> പെയ്‌മെന്റ് ട്രാക്കർ</h2>
    </div>

    <div class="main-card">
        <div class="header-section"><i class="fa fa-plus-circle"></i> പുതിയ പെയ്‌മെന്റ് നൽകുക</div>
        
        <div class="form-group">
            <label>വിഷയം (Title)</label>
            <input type="text" id="payTitle" placeholder="ഉദാ: പരീക്ഷ ഫീസ്">
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="form-group">
                <label>തുക (Amount)</label>
                <input type="number" id="payAmt" placeholder="₹">
            </div>
            <div class="form-group">
                <label>ക്ലാസ്സ്</label>
                <select id="classSel" onchange="loadStudents()">
                    <option value="All">എല്ലാം</option>
                    <script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">ക്ലാസ് ${i}</option>`)</script>
                </select>
            </div>
        </div>

        <div class="scroll-area" style="max-height: 200px;">
            <table>
                <thead>
                    <tr>
                        <th width="30"><input type="checkbox" id="masterCheck" onclick="toggleSelectAll(this)" checked></th>
                        <th>പേര്</th>
                        <th>ക്ലാസ്സ്</th>
                    </tr>
                </thead>
                <tbody id="stuList"></tbody>
            </table>
        </div>
        
        <button class="btn btn-add" style="margin-top:15px;" id="requestBtn" onclick="requestPayment()">
            <i class="fa fa-paper-plane"></i> പെയ്‌മെന്റ് ലിസ്റ്റ് സേവ് ചെയ്യുക
        </button>
    </div>

    <div class="main-card">
        <div class="header-section"><i class="fa fa-chart-line"></i> പെയ്‌മെന്റ് ട്രാക്കർ</div>
        
        <div class="form-group">
            <label>പ്രോഗ്രാം തിരഞ്ഞടുക്കുക</label>
            <select id="trackProgram" onchange="calculateStats()">
                <option value="">തിരഞ്ഞെടുക്കുക...</option>
            </select>
        </div>

        <div class="form-group">
            <label>ക്ലാസ്സ് പ്രകാരം കാണുക</label>
            <select id="trackClass" onchange="calculateStats()">
                <option value="All">എല്ലാ ക്ലാസ്സും</option>
                <script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">ക്ലാസ് ${i}</option>`)</script>
            </select>
        </div>

        <div class="stats-grid">
            <div class="stat-box bg-blue">
                <p>ആകെ വേണ്ടത്</p>
                <h2 id="totalNeeded">₹0</h2>
            </div>
            <div class="stat-box bg-green">
                <p>ലഭിച്ചത്</p>
                <h2 id="totalCollected">₹0</h2>
            </div>
            <div class="stat-box bg-orange">
                <p>ബാക്കിയുള്ളത്</p>
                <h2 id="totalPending">₹0</h2>
            </div>
        </div>

        <div class="scroll-area">
            <table>
                <thead>
                    <tr>
                        <th>പേര്</th>
                        <th>ക്ലാസ്</th>
                        <th>സ്റ്റാറ്റസ്</th>
                        <th>മാറ്റുക</th>
                    </tr>
                </thead>
                <tbody id="reportList"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
    databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com",
    projectId: "enttemadrasa"
};

firebase.initializeApp(firebaseConfig);
const fs = firebase.firestore();
const rtdb = firebase.database();
const mID = new URLSearchParams(window.location.search).get('id');

// Load Students for request
async function loadStudents() {
    const cls = document.getElementById('classSel').value;
    const list = document.getElementById('stuList');
    list.innerHTML = "<tr><td colspan='3' style='text-align:center'>Loading...</td></tr>";
    
    try {
        let q = fs.collection("students").where("madrasa_id", "==", mID);
        const snap = await q.get();
        list.innerHTML = "";
        snap.forEach(doc => {
            const s = doc.data();
            if(cls !== "All" && s.class != cls) return;
            const reg = s.regno || s.number;
            list.innerHTML += `<tr>
                <td><input type="checkbox" class="sc" value="${reg}" data-name="${s.name}" data-cls="${s.class}" checked></td>
                <td>${s.name}</td>
                <td>${s.class}</td>
            </tr>`;
        });
    } catch (e) { console.log(e); }
}

function toggleSelectAll(master) {
    document.querySelectorAll('.sc').forEach(c => c.checked = master.checked);
}

// Save Payment Request
async function requestPayment() {
    const title = document.getElementById('payTitle').value.trim();
    const amt = document.getElementById('payAmt').value;
    const checks = document.querySelectorAll('.sc:checked');
    if(!title || !amt || checks.length === 0) return alert("വിവരങ്ങൾ നൽകുക!");

    for(let c of checks) {
        await rtdb.ref(`payments/${mID}/${c.value}`).push({
            title: title, amount: amt, status: "Pending",
            date: new Date().toLocaleDateString('en-GB'),
            sName: c.getAttribute('data-name'), sClass: c.getAttribute('data-cls')
        });
    }
    alert("വിജയകരമായി സേവ് ചെയ്തു!");
    updateProgramList();
}

// Update Program List for tracking
function updateProgramList() {
    rtdb.ref(`payments/${mID}`).once('value', snap => {
        const programs = new Set();
        snap.forEach(student => {
            student.forEach(pay => { programs.add(pay.val().title); });
        });
        const sel = document.getElementById('trackProgram');
        sel.innerHTML = '<option value="">തിരഞ്ഞെടുക്കുക...</option>';
        programs.forEach(p => sel.innerHTML += `<option value="${p}">${p}</option>`);
    });
}

// Stats & Report Filtered by Class
function calculateStats() {
    const prog = document.getElementById('trackProgram').value;
    const trackCls = document.getElementById('trackClass').value;
    if(!prog) return;

    let totalNeed = 0, totalGot = 0;
    const list = document.getElementById('reportList');
    list.innerHTML = "";

    rtdb.ref(`payments/${mID}`).once('value', snap => {
        snap.forEach(student => {
            const reg = student.key;
            student.forEach(paySnap => {
                const p = paySnap.val();
                if(p.title === prog) {
                    // Class Filter
                    if(trackCls !== "All" && p.sClass != trackCls) return;

                    totalNeed += parseInt(p.amount);
                    const isPaid = p.status === "Paid";
                    if(isPaid) totalGot += parseInt(p.amount);

                    list.innerHTML += `<tr>
                        <td>${p.sName}</td>
                        <td>${p.sClass}</td>
                        <td><span class="status-badge ${isPaid ? 'bg-paid' : 'bg-pending'}">${p.status}</span></td>
                        <td><button class="btn-change" onclick="changeStatus('${reg}', '${paySnap.key}', '${p.status}')">Change</button></td>
                    </tr>`;
                }
            });
        });
        document.getElementById('totalNeeded').innerText = "₹" + totalNeed;
        document.getElementById('totalCollected').innerText = "₹" + totalGot;
        document.getElementById('totalPending').innerText = "₹" + (totalNeed - totalGot);
    });
}

async function changeStatus(reg, payId, current) {
    const newStatus = current === "Paid" ? "Pending" : "Paid";
    await rtdb.ref(`payments/${mID}/${reg}/${payId}`).update({ status: newStatus });
    calculateStats();
}

window.onload = () => { loadStudents(); updateProgramList(); };
</script>
</body>
</html>
