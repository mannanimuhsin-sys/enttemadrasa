<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>വിദ്യാർത്ഥി ഐഡി കാർഡ് പോർട്ടൽ</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --primary: #004d00; --gold: #d4af37; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .container { max-width: 500px; margin: auto; background: white; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
        
        .header { text-align: center; margin-bottom: 30px; padding-top: 20px; }
        .header img { width: 80px; }
        .header h2 { color: var(--primary); margin: 10px 0 5px; }
        .header p { margin: 0; color: #666; font-size: 14px; }

        .tabs { display: flex; background: #eee; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.3s; color: #666; }
        .tab.active { background: var(--primary); color: white; }

        .form-section { display: none; }
        .form-section.active { display: block; animation: fadeIn 0.3s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        label { display: block; margin-top: 10px; font-weight: bold; color: #444; font-size: 14.5px; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

        .photo-preview-wrap { text-align: center; margin: 15px 0; }
        .photo-preview { width: 110px; height: 135px; border: 2px dashed #ddd; border-radius: 10px; object-fit: cover; display: none; margin: 10px auto; }
        .photo-label { cursor: pointer; color: var(--primary); font-weight: bold; border: 2px solid var(--primary); padding: 8px 15px; border-radius: 8px; display: inline-block; }

        /* ID Card Styles */
        #idArea { display: none; text-align: center; }
        #idCard { 
            width: 320px; 
            height: 480px; 
            background: white; 
            margin: 20px auto; 
            border-radius: 15px; 
            overflow: hidden; 
            position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 5px solid var(--primary);
            text-align: left;
        }
        .card-header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        .card-header h3 { margin: 0; font-size: 16px; text-transform: uppercase; }
        .card-header p { margin: 5px 0 0; font-size: 11px; opacity: 0.9; }
        
        .card-body { padding: 12px; display: flex; flex-direction: column; align-items: center; }
        .student-photo { width: 100px; height: 120px; border: 2px solid var(--gold); border-radius: 5px; object-fit: cover; background: #f0f0f0; margin-bottom: 8px; }
        
        .card-info { width: 100%; }
        .info-row { display: flex; margin-bottom: 5px; font-size: 12.5px; border-bottom: 1px solid #f9f9f9; padding-bottom: 1px; }
        .info-label { width: 85px; font-weight: bold; color: #666; }
        .info-value { flex: 1; font-weight: bold; color: #000; }

        .card-footer { display: flex; justify-content: space-between; align-items: flex-end; padding: 10px 15px; width: 100%; box-sizing: border-box; position: absolute; bottom: 0; }
        .qr-code { width: 65px; height: 65px; }
        .signature-box { text-align: center; }
        .signature-line { border-top: 1px solid #000; width: 80px; margin-top: 25px; }
        .signature-text { font-size: 9px; font-weight: bold; margin-top: 2px; }

        .btn-download { background: #007bff; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="Logo">
        <h2 id="mNameDisplay">മദ്റസ ഐഡി പോർട്ടൽ</h2>
        <p id="mPlaceDisplay">രജിസ്റ്റർ നമ്പർ നൽകുക</p>
    </div>

    <div id="panel">
        <div class="tabs">
            <div id="tabLogin" class="tab active" onclick="switchTab('login')">LOGIN</div>
            <div id="tabReg" class="tab" onclick="switchTab('reg')">REGISTER</div>
        </div>

        <div id="loginForm" class="form-section active">
            <label>രജിസ്റ്റർ നമ്പർ</label>
            <input type="number" id="loginReg" placeholder="Enter Registration Number">
            <label>പാസ്‌വേഡ്</label>
            <input type="password" id="loginPass" placeholder="Enter Password">
            <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">പ്രവേശിക്കുക</button>
        </div>

        <div id="regForm" class="form-section">
            <div class="photo-preview-wrap">
                <img id="photoPreview" class="photo-preview" src="">
                <label for="studentPhoto" class="photo-label"><i class="fa fa-camera"></i> ഫോട്ടോ ചേർക്കുക</label>
                <input type="file" id="studentPhoto" accept="image/*" style="display: none;" onchange="previewPhoto(this)">
            </div>
            <input type="text" id="name" placeholder="വിദ്യാർത്ഥിയുടെ പേര്">
            <input type="number" id="regno" placeholder="രജിസ്റ്റർ നമ്പർ">
            <select id="classN">
                <option value="">ക്ലാസ് തിരഞ്ഞെടുക്കുക</option>
                <script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">${i}</option>`);</script>
            </select>
            <select id="gender">
                <option value="Male">ആൺകുട്ടി</option>
                <option value="Female">പെൺകുട്ടി</option>
            </select>
            <input type="text" id="father" placeholder="പിതാവിന്റെ പേര്">
            <input type="text" id="mentor" placeholder="ഉസ്താദിന്റെ പേര് (Mentor)">
            <input type="tel" id="phone" placeholder="മൊബൈൽ നമ്പർ">
            <select id="blood">
                <option value="">ബ്ലഡ് ഗ്രൂപ്പ്</option>
                <option value="A+">A+</option><option value="A-">A-</option>
                <option value="B+">B+</option><option value="B-">B-</option>
                <option value="O+">O+</option><option value="O-">O-</option>
                <option value="AB+">AB+</option><option value="AB-">AB-</option>
            </select>
            <label>ജനന തീയതി</label>
            <input type="date" id="dob">
            <input type="password" id="regPass" placeholder="ഒരു പാസ്‌വേഡ് നൽകുക">
            <input type="password" id="regPassConf" placeholder="പാസ്‌വേഡ് ഒന്നുകൂടി നൽകുക">
            <button class="btn btn-primary" id="saveBtn" onclick="handleRegistration()">രജിസ്റ്റർ ചെയ്യുക</button>
        </div>
    </div>

    <div id="idArea">
        <div id="idCard">
            <div class="card-header">
                <h3 id="cardMName">MADRASA NAME</h3>
                <p id="cardMPlace">LOCATION</p>
            </div>
            <div class="card-body">
                <img id="pImg" class="student-photo" src="" alt="Photo">
                <div class="card-info" id="cardInfoRows">
                </div>
            </div>
            <div class="card-footer">
                <img id="qr" class="qr-code" src="" alt="QR">
                <div class="signature-box">
                    <div class="signature-line"></div>
                    <div id="sadarNameDisplay" class="signature-text">SADAR MUALLIM</div>
                </div>
            </div>
        </div>
        <button class="btn btn-download" onclick="downloadID()"><i class="fa fa-download"></i> DOWNLOAD CARD</button>
        <button class="btn" style="background:#888; color:white;" onclick="location.reload()">BACK</button>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCe98Gw-si7idO0m8y5xbLLG8Z2HC3RCKE",
    authDomain: "mum-new-id.firebaseapp.com",
    projectId: "mum-new-id",
    storageBucket: "mum-new-id.firebasestorage.app",
    databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com"
};

const app = firebase.initializeApp(firebaseConfig);
const fs = firebase.firestore();
const rtdb = firebase.database();
const storage = firebase.storage();

const urlParams = new URLSearchParams(window.location.search);
const mId = urlParams.get('mid') || urlParams.get('id');
let uploadedFile = null;

window.onload = () => { if(mId) loadMadrasaData(); }

async function loadMadrasaData() {
    try {
        const snap = await rtdb.ref('madrasa_requests/' + mId).once('value');
        if(snap.exists()) {
            const d = snap.val();
            document.getElementById('mNameDisplay').innerText = d.name;
            document.getElementById('cardMName').innerText = d.name;
            document.getElementById('cardMPlace').innerText = d.place + (d.reg ? " (REG: " + d.reg + ")" : "");
        }
        const settings = await fs.collection("madrasa_settings").doc(mId).get();
        if(settings.exists) document.getElementById('sadarNameDisplay').innerText = settings.data().sadar_name || "SADAR MUALLIM";
    } catch(e) {}
}

function switchTab(t) {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.form-section').forEach(x => x.classList.remove('active'));
    document.getElementById('tab' + (t === 'login' ? 'Login' : 'Reg')).classList.add('active');
    document.getElementById(t + 'Form').classList.add('active');
}

function previewPhoto(input) {
    if(input.files && input.files[0]) {
        uploadedFile = input.files[0];
        const reader = new FileReader();
        reader.onload = e => {
            const img = document.getElementById('photoPreview');
            img.src = e.target.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(uploadedFile);
    }
}

async function hashPass(p) {
    const encoder = new TextEncoder();
    const data = encoder.encode(p);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function handleRegistration() {
    const fields = ['name', 'regno', 'classN', 'father', 'mentor', 'phone', 'gender', 'blood', 'dob', 'regPass', 'regPassConf'];
    const data = {};
    for(let f of fields) {
        data[f] = document.getElementById(f).value.trim();
        if(!data[f]) return alert("എല്ലാ വിവരങ്ങളും പൂരിപ്പിക്കുക!");
    }
    if(data.regPass !== data.regPassConf) return alert("പാസ്‌വേഡുകൾ ചേരുന്നില്ല!");
    if(!uploadedFile) return alert("ഫോട്ടോ ഉൾപ്പെടുത്തുക!");

    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.innerText = "UPLOADING...";

    try {
        const check = await fs.collection("students").doc(data.regno).get();
        if(check.exists) { alert("രജിസ്റ്റർ നമ്പർ നിലവിലുണ്ട്!"); btn.disabled = false; return; }

        const photoRef = storage.ref(`student_photos/${mId}/${data.regno}`);
        await photoRef.put(uploadedFile);
        const photoUrl = await photoRef.getDownloadURL();

        const student = {
            madrasa_id: mId, name: data.name, regno: data.regno, number: data.regno,
            class: data.classN, father: data.father, mentor: data.mentor, phone: data.phone,
            gender: data.gender, blood: data.blood, dob: data.dob, 
            password: await hashPass(data.regPass), photo: photoUrl, status: 'pending', timestamp: Date.now()
        };
        await fs.collection("students").doc(data.regno).set(student);
        alert("രജിസ്‌ട്രേഷൻ പൂർത്തിയായി! അഡ്മിൻ അപ്രൂവലിന് ശേഷം ലോഗിൻ ചെയ്യുക.");
        location.reload();
    } catch(e) { alert("Error: " + e.message); btn.disabled = false; }
}

async function handleLogin() {
    const reg = document.getElementById('loginReg').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    if(!reg || !pass) return alert("വിവരങ്ങൾ നൽകുക!");
    
    document.getElementById('loginBtn').disabled = true;
    try {
        const hp = await hashPass(pass);
        const doc = await fs.collection("students").doc(reg).get();
        if(doc.exists) {
            const s = doc.data();
            if(s.madrasa_id === mId && s.password === hp) {
                if(s.status === 'approved') showID(s);
                else alert("അപ്രൂവലിനായി കാത്തിരിക്കുക!");
            } else alert("വിവരങ്ങൾ തെറ്റാണ്!");
        } else alert("കാണാനായില്ല!");
    } catch(e) { alert(e.message); }
    document.getElementById('loginBtn').disabled = false;
}

function showID(s) {
    const rows = [
        ['NAME', s.name], ['REG NO', s.number], ['CLASS', s.class], ['FATHER', s.father],
        ['BLOOD', s.blood], ['DOB', s.dob.split("-").reverse().join("-")], ['PHONE', s.phone]
    ];
    let html = "";
    rows.forEach(r => html += `<div class="info-row"><span class="info-label">${r[0]}:</span><span class="info-value">${r[1]}</span></div>`);
    document.getElementById('cardInfoRows').innerHTML = html;
    document.getElementById('pImg').src = s.photo;
    document.getElementById('qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=REG:${s.number}`;
    document.getElementById('panel').style.display = 'none';
    document.getElementById('idArea').style.display = 'block';
}

function downloadID() {
    html2canvas(document.getElementById('idCard'), { scale: 3, useCORS: true }).then(canvas => {
        const a = document.createElement('a'); a.href = canvas.toDataURL(); a.download = 'ID_CARD.png'; a.click();
    });
}
</script>
</body>
</html>
