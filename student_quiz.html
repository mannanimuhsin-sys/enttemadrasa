<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Day Quiz - Student Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #004d00; --gold: #d4af37; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .quiz-container { max-width: 500px; margin: auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); min-height: 80vh; }
        
        /* Login Style */
        .login-box { text-align: center; padding: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }

        /* Student Info Card */
        .student-card { background: linear-gradient(135deg, #004d00, #002b00); color: white; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .student-card img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .student-info h4 { margin: 0; font-size: 16px; }
        .student-info p { margin: 2px 0; font-size: 12px; opacity: 0.8; }

        /* Timer Style */
        #timerBox { text-align: center; padding: 40px 20px; color: #d32f2f; }
        .countdown { font-size: 30px; font-weight: bold; margin-top: 10px; }

        /* Question Style */
        #quizHeader { padding: 15px 0 10px; }
        .question-box { display: none; background: #fff; padding: 22px; border-radius: 20px; border: 1px solid #e6e6e6; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .q-title { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 18px; }
        .option { background: #f8f9fa; border: 2px solid #dce9da; padding: 14px 16px; border-radius: 14px; margin-bottom: 12px; cursor: pointer; transition: 0.2s ease; }
        .option:hover { border-color: var(--primary); background: #e6f2e9; }
        .option.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-primary { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.25s ease; background: linear-gradient(135deg, #0a7b3d, #2fb24b); color: white; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 24px rgba(0,128,0,0.18); }
        .quiz-container { max-width: 540px; margin: auto; background: linear-gradient(180deg, #f7fff3 0%, #e5f7e2 100%); border-radius: 30px; padding: 25px; box-shadow: 0 18px 48px rgba(0,0,0,0.09); min-height: 88vh; }
        .login-box { text-align: center; padding: 25px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #d1e5d4; border-radius: 14px; box-sizing: border-box; background: #fff; }
        .student-card { background: linear-gradient(135deg, #0b662f, #1f8b4c); color: white; padding: 20px; border-radius: 20px; display: flex; align-items: center; gap: 18px; margin-bottom: 20px; box-shadow: 0 16px 32px rgba(0,0,0,0.12); }
        .student-card img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid rgba(255,215,0,0.95); object-fit: cover; }
        #timerBox { text-align: center; padding: 30px 18px; color: #1e4021; background: #fffcec; border-radius: 20px; border: 1px solid #f1e9c9; margin-bottom: 20px; }
        .countdown { font-size: 34px; font-weight: 800; margin-top: 12px; color: #0f5b1d; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quizHeader" style="text-align: center; display: none;">
        <h2 id="programTitle" style="color: var(--primary); margin-bottom: 5px;"></h2>
        <hr>
    </div>

    <div id="loginSection" class="login-box">
        <i class="fa fa-user-graduate" style="font-size: 50px; color: var(--primary);"></i>
        <h3>Student Login</h3>
        <p style="font-size: 13px; color: #666;">ഐഡി കാർഡിലെ വിവരങ്ങൾ നൽകുക</p>
        <input type="text" id="stuReg" placeholder="വിദ്യാർത്ഥി രജിസ്റ്റർ നമ്പർ">
        <input type="password" id="stuPass" placeholder="പാസ്‌വേഡ്">
        <button class="btn btn-primary" onclick="studentLogin()">CONFIRM & ENTER</button>
    </div>

    <div id="quizSection" style="display: none;">
        <div id="stuProfileCard"></div>

        <div id="timerBox">
            <i class="fa fa-clock" style="font-size: 40px;"></i>
            <p>ക്വിസ് തുടങ്ങാൻ ബാക്കിയുള്ള സമയം:</p>
            <div id="countdown" class="countdown">00:00:00</div>
        </div>

        <div id="questionArea" class="question-box">
            <div id="currentQuestion"></div>
            <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()" style="margin-top: 20px;">SUBMIT ANSWER</button>
        </div>
    </div>
</div>

<script>
    // Firebase Config (മദ്രസയും ID പോർട്ടലും ഒരേ അടിസ്ഥാനത്തിൽ പ്രവർത്തിക്കണം)
    const firebaseConfig = {
        apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
        authDomain: "enttemadrasa.firebaseapp.com",
        databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com",
        projectId: "enttemadrasa",
        storageBucket: "enttemadrasa.firebasestorage.app",
        appId: "1:623531881201:web:b863793340c3901cedaf50"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const rtdb = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const mID = urlParams.get('mid'); // മദ്റസ ID

    let currentStudent = null;
    let quizData = null;
    let selectedOption = null;
    let questionIndex = 0;
    let answers = [];

    // 1. ലോഗിൻ ഫംഗ്ഷൻ
    async function studentLogin() {
        const reg = document.getElementById('stuReg').value.trim();
        const pass = document.getElementById('stuPass').value.trim();

        if (!reg || !pass) {
            return alert("ദയവായി രജിസ്റ്റർ നമ്പറും പാസ്‌വേഡും നൽകുക!");
        }

        try {
            const doc = await db.collection('students').doc(reg).get();
            if (!doc.exists) {
                return alert("രജിസ്റ്റർ നമ്പർ കണ്ടെത്തിയില്ല!");
            }

            const s = doc.data();
            if (s.madrasa_id !== mID || s.password !== pass) {
                return alert("തെറ്റായ രജിസ്റ്റർ നമ്പർ അല്ലെങ്കിൽ പാസ്‌വേഡാണ്!");
            }
            if (s.status !== 'approved') {
                return alert("അഡ്മിൻ അംഗീകാരത്തിനായി കാത്തിരിക്കൂ.");
            }

            currentStudent = { ...s, regNo: reg };
            
            // ✅ ലോഗിൻ ചെയ്ത ശേഷം സബ്മിഷൻ ഉണ്ടോ എന്ന് ഫയർസ്റ്റോറിൽ നോക്കുന്നു
            const submissionDoc = await db.collection('quiz_submissions').doc(mID).collection('students').doc(reg).get();
            if (submissionDoc.exists) {
                return showAlreadySubmitted();
            }
            
            // ബാക്ക്-അപ്പ് RTDB
            const submissionSnap = await rtdb.ref('quiz_submissions/' + mID + '/' + reg).once('value');
            if (submissionSnap.exists()) {
                return showAlreadySubmitted();
            }

            showQuizDashboard();
        } catch (error) {
            console.error(error);
            alert("ലോഗിൻ തകരാറായി. ദയവായി വീണ്ടും ശ്രമിക്കുക.");
        }
    }

    function showAlreadySubmitted() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('quizSection').style.display = 'block';
        document.getElementById('quizHeader').style.display = 'block';
        document.getElementById('programTitle').innerText = 'നിങ്ങൾ ഇതിനകം ക്വിസ് സബ്മിറ്റ് ചെയ്തിട്ടുണ്ട്';
        document.getElementById('timerBox').innerHTML = '<h3>ഒരു രജിസ്റ്റർ നമ്പറിൽ നിന്ന് ഒരേ ക്വിസ് ഒരു തവണ മാത്രമേ നൽകാവൂ.</h3>';
        document.getElementById('questionArea').style.display = 'none';
    }

    // 2. ക്വിസ് ഡാഷ്ബോർഡ് കാണിക്കുന്നു
    function showQuizDashboard() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('quizSection').style.display = 'block';

        // പ്രൊഫൈൽ കാർഡ് നിർമ്മാണം
        document.getElementById('stuProfileCard').innerHTML = `
            <div class="student-card">
                <img src="${currentStudent.photo || 'https://via.placeholder.com/100'}">
                <div class="student-info">
                    <h4>${currentStudent.name}</h4>
                    <p>Reg No: ${currentStudent.regNo} | Class: ${currentStudent.class}</p>
                    <p>Mentor: ${currentStudent.mentor}</p>
                </div>
            </div>`;

        loadQuizInfo();
    }

    // 3. ക്വിസ് വിവരങ്ങളും ടൈമറും ലോഡ് ചെയ്യുന്നു
    async function loadQuizInfo() {
        try {
            // ✅ ആദ്യം ഫയർസ്റ്റോറിൽ നോക്കുന്നു
            const doc = await db.collection('quizzes').doc(mID).get();
            quizData = doc.exists ? doc.data() : null;

            if (!quizData) {
                // ബാക്ക്-അപ്പ് RTDB
                const snap = await rtdb.ref('quizzes/' + mID).once('value');
                quizData = snap.val();
            }

            if (!quizData || quizData.status !== 'published') {
                document.getElementById('timerBox').innerHTML = '<h3>നിലവിൽ ക്വിസ് ലഭ്യമല്ല!</h3>';
                return;
            }

            document.getElementById('quizHeader').style.display = 'block';
            document.getElementById('programTitle').innerText = quizData.heading;

            if (new Date().getTime() >= quizData.startTime) {
                showQuestions();
            } else {
                startTimer(quizData.startTime);
            }
        } catch (error) {
            console.error(error);
            document.getElementById('timerBox').innerHTML = '<h3>ക്വിസ് വിവരങ്ങൾ വായിക്കുന്നതിനിടയിൽ പിഴവ് സംഭവിച്ചു.</h3>';
        }
    }

    // 4. ടൈമർ ലോജിക്
    function startTimer(startTime) {
        const timerInterval = setInterval(() => {
            const now = new Date().getTime();
            const distance = startTime - now;

            if (distance <= 0) {
                clearInterval(timerInterval);
                showQuestions();
            } else {
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                document.getElementById('countdown').innerHTML = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }, 1000);
    }

    // 5. ചോദ്യങ്ങൾ കാണിക്കുന്നു
    function showQuestions() {
        if (!quizData || !quizData.questions || !quizData.questions.length) {
            document.getElementById('timerBox').innerHTML = '<h3>ചോദ്യങ്ങൾ ലഭ്യമല്ല.</h3>';
            return;
        }

        document.getElementById('timerBox').style.display = 'none';
        document.getElementById('questionArea').style.display = 'block';
        selectedOption = null;

        const q = quizData.questions[questionIndex];
        let optionsHtml = q.options.map((opt, i) => `
            <div class="option" onclick="selectOpt(this, ${i + 1})">${opt}</div>
        `).join('');

        document.getElementById('currentQuestion').innerHTML = `
            <div class="q-title">Q ${questionIndex + 1} of ${quizData.questions.length}: ${q.question}</div>
            ${optionsHtml}`;
        document.getElementById('submitBtn').innerText = questionIndex < quizData.questions.length - 1 ? 'NEXT QUESTION' : 'SUBMIT ANSWER';
    }

    function selectOpt(el, val) {
        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selectedOption = val;
    }

    async function submitAnswer() {
        if (!selectedOption) return alert('ദയവായി ഒരു ഓപ്ഷൻ തിരഞ്ഞെടുക്കുക!');
        if (!quizData || !quizData.questions || !quizData.questions.length) return;

        const q = quizData.questions[questionIndex];
        answers.push({
            question: q.question,
            selectedAnswer: selectedOption,
            correctAnswer: q.correct,
            isCorrect: selectedOption == q.correct
        });

        questionIndex++;
        if (questionIndex < quizData.questions.length) {
            showQuestions();
            return;
        }

        const resultData = {
            studentName: currentStudent.name,
            regNo: currentStudent.regNo,
            class: currentStudent.class,
            mentor: currentStudent.mentor || '',
            photo: currentStudent.photo || '',
            answers: answers,
            score: answers.filter(a => a.isCorrect).length,
            totalQuestions: answers.length,
            submitTime: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            // ✅ ഫയർസ്റ്റോറിലേക്ക് സബ്മിറ്റ് ചെയ്യുന്നു
            await db.collection('quiz_submissions').doc(mID).collection('students').doc(currentStudent.regNo).set(resultData);
            
            // RTDB സിങ്ക് (പഴയ അഡ്മിൻ പാനലുകൾക്കായി)
            rtdb.ref('quiz_submissions/' + mID + '/' + currentStudent.regNo).set({
                ...resultData,
                submitTime: new Date().getTime()
            });

            // ✅ സുപാബേസിലേക്ക് സിങ്ക് ചെയ്യുന്നു
            try {
                if (window.supabaseClient) {
                    window.supabaseClient.from('quiz_submissions').insert({
                        madrasa_id: mID,
                        student_name: currentStudent.name,
                        score: resultData.score,
                        submitted_at: new Date().toISOString()
                    }).then(({ error }) => {
                        if (error) console.error("Supabase Submission Error:", error);
                    });
                }
            } catch (e) {
                console.error("Supabase Sync Failed:", e);
            }

            alert(`സബ്മിഷൻ പൂർത്തിയായി! സ്കോർ: ${resultData.score}/${resultData.totalQuestions}`);
            location.reload();
        } catch (error) {
            console.error(error);
            alert('സബ്മിഷൻ പിഴവ്. ദയവായി വീണ്ടും ശ്രമിക്കുക.');
        }
    }
</script>

</body>
</html>
