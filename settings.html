<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്റസ കൺട്രോൾ പാനൽ</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <style>
        :root { --primary: #004d00; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .settings-box { max-width: 400px; margin: 20px auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        .control-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; border-radius: 12px; margin-bottom: 12px; 
            background: #fff; border: 1px solid #eee; transition: 0.2s;
        }
        .toggle-btn { 
            padding: 10px 18px; border-radius: 8px; border: none; 
            cursor: pointer; font-weight: bold; min-width: 95px; font-size: 13px;
        }
        .btn-on { background: #4caf50; color: white; box-shadow: 0 3px 6px rgba(76,175,80,0.2); }
        .btn-off { background: #f44336; color: white; box-shadow: 0 3px 6px rgba(244,67,54,0.2); }
        .salah-bg { background: #e8f5e9; border-color: #c8e6c9; }
        .hajar-bg { background: #fff8e1; border-color: #ffecb3; }
        .save-btn { 
            width: 100%; margin-top: 15px; padding: 15px; 
            background: var(--primary); color: white; border: none; 
            border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        #status { text-align: center; font-size: 12px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="settings-box">
        <h2>കൺട്രോൾ പാനൽ</h2>
        <div id="status" style="color: #666;">Madrasa ID: Loading...</div>

        <div class="control-item"><span>Dashboard</span><button id="dash" class="toggle-btn btn-on" onclick="toggle('dash')">SHOWING</button></div>
        <div class="control-item"><span>ID Card Portal</span><button id="id_card" class="toggle-btn btn-on" onclick="toggle('id_card')">SHOWING</button></div>
        <div class="control-item"><span>Special Quiz</span><button id="quiz" class="toggle-btn btn-on" onclick="toggle('quiz')">SHOWING</button></div>
        <div class="control-item"><span>Payment & Receipts</span><button id="payment" class="toggle-btn btn-on" onclick="toggle('payment')">SHOWING</button></div>

        <div class="control-item salah-bg">
            <span style="color: #2e7d32; font-weight: bold;">Salah Tracker</span>
            <button id="salah" class="toggle-btn btn-on" onclick="toggle('salah')">SHOWING</button>
        </div>

        <div class="control-item hajar-bg">
            <span style="color: #fb8c00; font-weight: bold;">Hajar (Attendance)</span>
            <button id="hajar" class="toggle-btn btn-on" onclick="toggle('hajar')">SHOWING</button>
        </div>

        <button class="save-btn" onclick="window.history.back()">SAVE & BACK</button>
    </div>

    <script>
        const conf = {
            apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
            authDomain: "enttemadrasa.firebaseapp.com",
            databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com",
            projectId: "enttemadrasa",
            storageBucket: "enttemadrasa.firebasestorage.app",
            appId: "1:623531881201:web:b863793340c3901cedaf50"
        };
        firebase.initializeApp(conf);
        const fs = firebase.firestore();
        const mID = new URLSearchParams(window.location.search).get('id');
        let settings = { dash:true, id_card:true, quiz:true, payment:true, salah:true, hajar:true };

        if (mID) {
            document.getElementById('status').innerText = "Madrasa ID: " + mID;
            
            // 1. ഫയർസ്റ്റോറിൽ നിന്ന് വായിക്കുന്നു
            fs.collection('settings').doc(mID).onSnapshot(doc => {
                if (doc.exists) {
                    settings = { ...settings, ...doc.data() };
                    render();
                }
            });

            // 2. സുപാബേസിൽ നിന്ന് വായിക്കുന്നു (Fallback/Sync)
            if (window.supabaseClient) {
                window.supabaseClient.from('settings').select('*').eq('id', mID).single().then(res => {
                    if (res.data) {
                        settings = { ...settings, ...res.data.data };
                        render();
                    }
                });
            }
        }

        function render() {
            Object.keys(settings).forEach(key => {
                const btn = document.getElementById(key);
                if (btn) {
                    const val = settings[key] !== false;
                    btn.innerText = val ? "SHOWING" : "HIDDEN";
                    btn.className = val ? "toggle-btn btn-on" : "toggle-btn btn-off";
                }
            });
        }

        async function toggle(key) {
            if (!mID) return;
            settings[key] = !settings[key]; 
            render(); 

            try {
                // ✅ ഫയർസ്റ്റോറിൽ സേവ് ചെയ്യുന്നു
                await fs.collection('settings').doc(mID).set(settings);
                
                // ✅ സുപാബേസിലേക്ക് സിങ്ക് ചെയ്യുന്നു 
                if (window.supabaseClient) {
                    await window.supabaseClient.from('settings').upsert({
                        id: mID,
                        data: settings,
                        updated_at: new Date().toISOString()
                    });
                }
                
                console.log("Settings saved successfully.");
            } catch (e) {
                console.error("Save Error:", e);
                alert("സേവ് ചെയ്യുന്നതിൽ പിശക്! (Error: " + e.message + ")");
            }
        }
    </script>
</body>
</html>
