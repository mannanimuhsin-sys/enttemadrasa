<!DOCTYPE html>
<html lang="ml">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്റസ സെറ്റിംഗ്സ്</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <style>
        :root {
            --primary: #004d00;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            padding: 20px;
        }

        .settings-box {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .toggle-btn {
            padding: 8px 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            min-width: 90px;
            transition: 0.3s;
        }

        .btn-on {
            background: #4caf50;
            color: white;
        }

        .btn-off {
            background: #f44336;
            color: white;
        }

        .back-btn {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="settings-box">
        <h2>കൺട്രോൾ പാനൽ</h2>
        <p style="text-align: center; font-size: 13px; color: #666;">രക്ഷിതാക്കളുടെ പേജിലെ ബട്ടണുകൾ നിയന്ത്രിക്കുക</p>

        <div class="control-item">
            <span>Dashboard</span>
            <button id="btn_dash" class="toggle-btn btn-on" onclick="toggleFeature('dash')">SHOWING</button>
        </div>

        <div class="control-item">
            <span>ID Card Portal</span>
            <button id="btn_id" class="toggle-btn btn-on" onclick="toggleFeature('id')">SHOWING</button>
        </div>

        <div class="control-item">
            <span>Special Quiz</span>
            <button id="btn_quiz" class="toggle-btn btn-on" onclick="toggleFeature('quiz')">SHOWING</button>
        </div>

        <div class="control-item">
            <span>Payment & Receipts</span>
            <button id="btn_payment" class="toggle-btn btn-on" onclick="toggleFeature('payment')">SHOWING</button>
        </div>

        <div class="control-item" style="background: #e8f5e9; border-radius: 8px;">
            <span style="font-weight: bold; color: #2e7d32;">Salah Tracker</span>
            <button id="btn_salah" class="toggle-btn btn-on" onclick="toggleFeature('salah')">SHOWING</button>
        </div>

        <div class="control-item" style="background: #fff8e1; border-radius: 8px;">
            <span style="font-weight: bold; color: #fb8c00;">Hajar Portal (Attendance)</span>
            <button id="btn_hajar" class="toggle-btn btn-on" onclick="toggleFeature('hajar')">SHOWING</button>
        </div>

        <button class="back-btn" onclick="window.history.back()">SAVE & BACK</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
            authDomain: "enttemadrasa.firebaseapp.com",
            databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com",
            projectId: "enttemadrasa",
            storageBucket: "enttemadrasa.firebasestorage.app",
            appId: "1:623531881201:web:b863793340c3901cedaf50"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const firestore = firebase.firestore();
        const storage = firebase.storage();

        const urlParams = new URLSearchParams(window.location.search);
        const mID = urlParams.get('id');

        // സലാ ട്രാക്കർ ഉൾപ്പെടെ എല്ലാം ഡിഫോൾട്ടായി ഓൺ ആക്കുന്നു
        let currentSettings = { dash: true, id: true, quiz: true, payment: true, salah: true, hajar: true };

        if (mID) {
            loadSettings();
        }

        async function loadSettings() {
            // ഉടൻ തന്നെ ഡിഫോൾട്ട് സെറ്റിംഗ്സ് കാണിക്കുന്നു
            updateUI();
            if (!mID) return;
            // ✅ ആദ്യം സുപാബേസിൽ പുതിയ സെറ്റിംഗ്സ് നോക്കുന്നു
            if (window.supabaseClient) {
                const { data, error } = await window.supabaseClient.from('settings').select('*').eq('mID', mID).single();
                if (data && !error) {
                    currentSettings = data;
                    updateUI();
                    return;
                }
            }

            // ✅ ഫയർസ്റ്റോറിൽ റിയൽ-ടൈം ലിസണർ (Fallback)
            firestore.collection('settings').doc(mID).onSnapshot(doc => {
                if (doc.exists) {
                    currentSettings = doc.data();
                    updateUI();
                } else {
                    // ഫയർസ്റ്റോറിൽ ഇല്ലെങ്കിൽ പഴയ RTDB നോക്കുന്നു
                    db.ref('settings/' + mID).on('value', snap => {
                        if (snap.exists()) {
                            currentSettings = snap.val();
                        }
                        updateUI();
                    });
                }
            });
        }

        function updateUI() {
            if (currentSettings.dash === undefined) currentSettings.dash = true;
            if (currentSettings.id === undefined) currentSettings.id = true;
            if (currentSettings.quiz === undefined) currentSettings.quiz = true;
            if (currentSettings.payment === undefined) currentSettings.payment = true;
            if (currentSettings.salah === undefined) currentSettings.salah = true;
            if (currentSettings.hajar === undefined) currentSettings.hajar = true;

            updateBtn('btn_dash', currentSettings.dash);
            updateBtn('btn_id', currentSettings.id);
            updateBtn('btn_quiz', currentSettings.quiz);
            updateBtn('btn_payment', currentSettings.payment);
            updateBtn('btn_salah', currentSettings.salah);
            updateBtn('btn_hajar', currentSettings.hajar);
        }

        function updateBtn(elementId, state) {
            const btn = document.getElementById(elementId);
            if (btn) {
                btn.innerText = (state !== false) ? "SHOWING" : "HIDDEN";
                btn.className = (state !== false) ? "toggle-btn btn-on" : "toggle-btn btn-off";
            }
        }

        async function toggleFeature(feature) {
            currentSettings[feature] = !currentSettings[feature];
            
            // ✅ സുപാബേസിൽ അപ്‌ഡേറ്റ് ചെയ്യുന്നു
            if (window.supabaseClient) {
                await window.supabaseClient.from('settings').upsert({
                    mID: mID,
                    ...currentSettings
                }, { onConflict: 'mID' });
            }

            // ഫയർസ്റ്റോറിലും സിങ്ക് ചെയ്യുന്നു
            firestore.collection('settings').doc(mID).set(currentSettings);
            db.ref('settings/' + mID).set(currentSettings);
            updateUI();
        }
    </script>
</body>

</html>
