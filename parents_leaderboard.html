<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salah Winner | Leaderboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --primary: #004d00; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* Poster Header Style */
        .poster-header { 
            background: linear-gradient(135deg, #004d00, #002e00); 
            color: white; padding: 50px 20px; text-align: center; 
            border-radius: 0 0 40px 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative; overflow: hidden;
        }
        .poster-header::before {
            content: "\f695"; font-family: "Font Awesome 6 Free"; font-weight: 900;
            position: absolute; top: -20px; right: -20px; font-size: 150px; opacity: 0.1;
        }
        .poster-header h1 { margin: 0; font-size: 32px; font-weight: 900; letter-spacing: 2px; color: var(--gold); }
        .m-name { margin: 10px 0; font-size: 18px; font-weight: 500; opacity: 0.9; }
        
        .total-box { 
            background: rgba(255,255,255,0.1); display: inline-block; padding: 10px 25px; 
            border-radius: 30px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.2);
            font-size: 14px; font-weight: bold;
        }

        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        /* Executive Winner Cards */
        .winners-row { display: flex; justify-content: center; align-items: flex-end; gap: 12px; margin-top: -60px; margin-bottom: 40px; }
        .winner-card { 
            background: white; border-radius: 20px; padding: 20px 10px; text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); flex: 1; position: relative; border-bottom: 6px solid #ddd;
        }
        .rank-1 { height: 190px; border-color: var(--gold); z-index: 3; scale: 1.1; }
        .rank-2 { height: 160px; border-color: var(--silver); }
        .rank-3 { height: 150px; border-color: var(--bronze); }
        
        .crown { font-size: 24px; color: var(--gold); margin-bottom: 5px; display: block; }
        .winner-score { font-size: 26px; font-weight: 900; color: var(--primary); display: block; }
        .winner-name { font-size: 11px; font-weight: bold; color: #333; margin: 8px 0; height: 32px; overflow: hidden; }
        .medal { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; color: white; font-weight: bold; }

        /* List Style */
        .list-container { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .list-item { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid #f5f5f5; }
        .list-rank { width: 35px; font-weight: 800; color: #ccc; font-size: 18px; }
        .student-info { flex: 1; margin-left: 10px; }
        .student-info b { display: block; font-size: 16px; color: #333; }
        .student-info small { color: #888; font-size: 12px; }
        
        .points-info { text-align: right; }
        .points-now { font-weight: 900; color: var(--primary); font-size: 20px; }
        .points-total { font-size: 11px; color: #aaa; }

        .loading { text-align: center; padding: 50px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="poster-header">
    <h1><i class="fa fa-star"></i> SALAH WINNER</h1>
    <div id="mName" class="m-name">മദ്റസ വിവരങ്ങൾ ശേഖരിക്കുന്നു...</div>
    <div class="total-box">
        TOTAL JAMA'AT: <span id="totalJ">0</span>
    </div>
</div>

<div class="container">
    <div id="topSection" class="winners-row" style="display: none;">
        <div id="rank2" class="winner-card rank-2"></div>
        <div id="rank1" class="winner-card rank-1">
            <i class="fa fa-crown crown"></i>
        </div>
        <div id="rank3" class="winner-card rank-3"></div>
    </div>

    <div id="leaderboardList" class="list-container">
        <div class="loading">Please wait...</div>
    </div>
</div>

<script>
    // നിങ്ങളുടെ Firebase Config ഇവിടെ നൽകുക
    const firebaseConfig = {
        apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
        authDomain: "enttemadrasa.firebaseapp.com",
        databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com",
        projectId: "enttemadrasa",
        storageBucket: "enttemadrasa.firebasestorage.app",
        appId: "1:623531881201:web:b863793340c3901cedaf50"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const rtdb = firebase.database();

    // URL-ൽ നിന്നോ ലോക്കൽ സ്റ്റോറേജിൽ നിന്നോ മദ്റസ ഐഡി എടുക്കുന്നു
    const urlParams = new URLSearchParams(window.location.search);
    let mId = urlParams.get('id') || localStorage.getItem("madrasaId");

    async function loadSalahWinner() {
        if(!mId) {
            document.getElementById('mName').innerText = "മദ്റസ ഐഡി കണ്ടെത്തിയില്ല.";
            return;
        }

        try {
            // ✅ ആദ്യം മദ്റസ പേര് ലോഡ് ചെയ്യുന്നു (ഫയർസ്റ്റോറിൽ നിന്ന്)
            const mDoc = await db.collection('madrasa_requests').doc(mId).get();
            if(mDoc.exists) {
                document.getElementById('mName').innerText = mDoc.data().name;
            } else {
                // ബാക്ക്-അപ്പ് RTDB
                const mSnap = await rtdb.ref(`madrasa_requests/${mId}`).once('value');
                if(mSnap.exists()) document.getElementById('mName').innerText = mSnap.val().name;
            }

            // ✅ ടോട്ടൽ പോയിന്റുകൾ ഫയർസ്റ്റോറിൽ നിന്ന് ലോഡ് ചെയ്യുന്നു
            const totalsSnap = await db.collection("salah_totals").doc(mId).collection("students")
                                       .orderBy("totalPoints", "desc")
                                       .limit(100) // ആദ്യത്തെ 100 പേരെ മാത്രം കാണിക്കുന്നു
                                       .get();

            let winners = [];
            totalsSnap.forEach(doc => {
                const data = doc.data();
                winners.push({
                    name: data.name,
                    reg: doc.id,
                    cls: data.class,
                    score: data.totalPoints || 0
                });
            });

            // ആകെ ജമാഅത്തുകൾ ഏകദേശ കണക്ക് (ഇതൊരു ഇമ്പ്രൂവ്മെന്റ് ആവശ്യമാണ്)
            // നിലവിൽ 30 ദിവസം * 5 ജമാഅത്ത് = 150 എന്ന് കണക്കാക്കുന്നു, അല്ലെങ്കിൽ ഡാറ്റയിൽ നിന്ന് എടുക്കാം
            const totalPossible = 150; 
            document.getElementById('totalJ').innerText = totalPossible;

            renderUI(winners, totalPossible);

        } catch (e) {
            console.error(e);
            document.getElementById('leaderboardList').innerHTML = "<div class='loading'>ഡാറ്റ ലോഡ് ചെയ്യുന്നതിൽ പിശക്.</div>";
        }
    }

    function renderUI(list, total) {
        const listDiv = document.getElementById('leaderboardList');
        listDiv.innerHTML = "";

        if(list.length > 0) {
            document.getElementById('topSection').style.display = 'flex';
            
            // Winners Cards
            setWinner('rank1', list[0], 1, '#ffd700', total);
            if(list[1]) setWinner('rank2', list[1], 2, '#c0c0c0', total);
            if(list[2]) setWinner('rank3', list[2], 3, '#cd7f32', total);
        }

        // മുഴുവൻ ആൺകുട്ടികളുടെ ലിസ്റ്റ്
        list.forEach((s, i) => {
            listDiv.innerHTML += `
                <div class="list-item">
                    <div class="list-rank">${i+1}</div>
                    <div class="student-info">
                        <b>${s.name}</b>
                        <small>Reg: ${s.reg} | Class: ${s.cls}</small>
                    </div>
                    <div class="points-info">
                        <span class="points-now">${s.score}</span>
                        <span class="points-total">/${total}</span>
                    </div>
                </div>`;
        });
    }

    function setWinner(id, s, r, color, total) {
        const el = document.getElementById(id);
        if(!el) return;
        const crownHtml = r === 1 ? '<i class="fa fa-crown crown"></i>' : '';
        el.innerHTML = `
            ${crownHtml}
            <div class="medal" style="background:${color}">${r}</div>
            <div class="winner-name">${s.name}</div>
            <div class="winner-score">${s.score}</div>
            <div class="points-total">/${total}</div>
        `;
    }

    window.onload = loadSalahWinner;
</script>

</body>
</html>
