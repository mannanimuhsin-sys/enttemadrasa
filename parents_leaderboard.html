<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salah Leaderboard | എന്‍റെ മദ്റസ</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --primary: #004d00; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        .hero { background: linear-gradient(135deg, var(--primary), #002e00); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 30px 30px; }
        .hero h1 { margin: 0; font-size: 24px; }
        
        /* ആകെ നടന്ന നിസ്കാരങ്ങൾ കാണിക്കുന്ന ബോക്സ് */
        .total-info { background: rgba(255,255,255,0.1); display: inline-block; padding: 8px 15px; border-radius: 20px; margin-top: 15px; font-size: 13px; border: 1px solid rgba(255,255,255,0.3); }

        .container { padding: 20px; max-width: 600px; margin: auto; }
        
        .top-three { display: flex; justify-content: center; align-items: flex-end; gap: 10px; margin-top: -40px; margin-bottom: 30px; }
        .top-card { background: white; border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); flex: 1; border-top: 5px solid #ddd; }
        .rank-1 { height: 170px; border-color: var(--gold); z-index: 2; }
        .rank-2 { height: 145px; border-color: var(--silver); }
        .rank-3 { height: 135px; border-color: var(--bronze); }
        
        .badge { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-weight: bold; color: white; }
        .top-score { font-size: 22px; font-weight: 800; color: var(--primary); }
        .out-of { font-size: 11px; color: #777; font-weight: normal; }

        .rank-list { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .rank-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f0f0f0; }
        .rank-number { width: 30px; font-weight: bold; color: #999; }
        .student-details { flex-grow: 1; padding-left: 10px; }
        .student-details b { font-size: 15px; color: #333; }
        .student-details span { display: block; font-size: 11px; color: #888; }
        
        .score-display { text-align: right; }
        .score-val { font-weight: 800; color: var(--primary); font-size: 18px; }
        .percent-bar { width: 100px; height: 6px; background: #eee; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .percent-fill { height: 100%; background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

<div class="hero">
    <h1><i class="fa fa-chart-line"></i> SALAH LEADERBOARD</h1>
    <p id="mName">മദ്റസ പേര് ലോഡ് ചെയ്യുന്നു...</p>
    <div class="total-info">
        ആകെ നടന്ന ജമാഅത്തുകൾ: <span id="totalPossible">0</span>
    </div>
</div>

<div class="container">
    <div id="topSection" class="top-three" style="display: none;">
        <div id="rank2" class="top-card rank-2"></div>
        <div id="rank1" class="top-card rank-1"></div>
        <div id="rank3" class="top-card rank-3"></div>
    </div>

    <div id="leaderboardList" class="rank-list">
        <div style="text-align:center; padding:30px;">റാങ്ക് ലിസ്റ്റ് ലോഡ് ചെയ്യുന്നു...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCe98Gw-si7idO0m8y5xbLLG8Z2HC3RCKE",
        authDomain: "mum-new-id.firebaseapp.com",
        projectId: "mum-new-id",
        storageBucket: "mum-new-id.firebasestorage.app",
        databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const rtdb = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const mId = urlParams.get('id');

    async function loadData() {
        if(!mId) return;

        // 1. മദ്റസയുടെ അടിസ്ഥാന വിവരങ്ങൾ
        rtdb.ref(`madrasa_requests/${mId}`).once('value', snap => {
            if(snap.exists()) document.getElementById('mName').innerText = snap.val().name + " - " + snap.val().place;
        });

        // 2. ആകെ നടന്ന നിസ്കാരങ്ങൾ കണക്കാക്കുന്നു
        // എല്ലാ കുട്ടികളുടേയും എല്ലാ ദിവസത്തെയും റെക്കോർഡുകൾ നോക്കി ആകെ എത്ര ദിവസങ്ങളിൽ എൻട്രി ഉണ്ടെന്ന് കണ്ടെത്തുന്നു
        const recordsSnap = await rtdb.ref(`salah_records/${mId}`).once('value');
        const allRecords = recordsSnap.val() || {};
        
        let allDates = new Set();
        for(let sid in allRecords) {
            for(let date in allRecords[sid]) {
                if(date.includes('-')) allDates.add(date);
            }
        }
        
        // ആകെ നടന്ന നിസ്കാരങ്ങൾ = ആകെ ദിവസങ്ങൾ * 5 (ഫജ്‌ർ മുതൽ ഇശാ വരെ)
        const totalPossibleScore = allDates.size * 5;
        document.getElementById('totalPossible').innerText = totalPossibleScore;

        // 3. കുട്ടികളുടെ വിവരങ്ങളും സ്കോറും എടുക്കുന്നു
        const studentSnap = await db.collection("students").where("madrasa_id", "==", mId).get();
        const scoreSnap = await rtdb.ref(`salah_total/${mId}`).once('value');
        const scores = scoreSnap.val() || {};

        let leaderboard = [];
        studentSnap.forEach(doc => {
            const s = doc.data();
            const myScore = scores[doc.id] || 0;
            leaderboard.push({
                name: s.name,
                reg: s.number || '-',
                cls: s.class,
                score: myScore,
                percent: totalPossibleScore > 0 ? (myScore / totalPossibleScore) * 100 : 0
            });
        });

        leaderboard.sort((a, b) => b.score - a.score);
        display(leaderboard, totalPossibleScore);
    }

    function display(list, total) {
        const listDiv = document.getElementById('leaderboardList');
        listDiv.innerHTML = "";

        if(list.length >= 3) {
            document.getElementById('topSection').style.display = 'flex';
            renderTop('rank1', list[0], 1, 'bg-gold', total);
            renderTop('rank2', list[1], 2, 'bg-silver', total);
            renderTop('rank3', list[2], 3, 'bg-bronze', total);
        }

        list.forEach((s, i) => {
            listDiv.innerHTML += `
                <div class="rank-item">
                    <div class="rank-number">${i+1}</div>
                    <div class="student-details">
                        <b>${s.name}</b>
                        <span>Reg: ${s.reg} | Class: ${s.cls}</span>
                    </div>
                    <div class="score-display">
                        <span class="score-val">${s.score}<small class="out-of">/${total}</small></span>
                        <div class="percent-bar"><div class="percent-fill" style="width:${s.percent}%"></div></div>
                    </div>
                </div>
            `;
        });
    }

    function renderTop(id, s, r, cls, total) {
        document.getElementById(id).innerHTML = `
            <div class="badge ${cls === 'bg-gold' ? 'bg-gold' : (cls === 'bg-silver' ? 'bg-silver' : 'bg-bronze')}" 
                 style="background:${cls === 'bg-gold' ? '#ffd700' : (cls === 'bg-silver' ? '#c0c0c0' : '#cd7f32')}">${r}</div>
            <b style="font-size:12px; display:block; margin-bottom:5px;">${s.name}</b>
            <span class="top-score">${s.score}</span><span class="out-of">/${total}</span>
            <div style="font-size:9px; color:#999; margin-top:5px;">TOTAL POINTS</div>
        `;
    }

    loadData();
</script>

</body>
</html>
