<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>സലാഹ് ലീഡർബോർഡ്</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --primary: #004d00; --gold: #ffd700; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        
        .header-card { 
            background: linear-gradient(135deg, #004d00, #002b00); 
            color: white; padding: 30px 20px; border-radius: 20px; 
            text-align: center; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .rank-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: white; padding: 15px; margin-bottom: 12px; 
            border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 5px solid transparent; transition: 0.3s;
        }
        
        /* ടോപ്പ് 3 റാങ്ക് സ്റ്റൈലുകൾ */
        .rank-1 { border-left-color: var(--gold); background: #fffdf0; }
        .rank-2 { border-left-color: #c0c0c0; }
        .rank-3 { border-left-color: #cd7f32; }

        .rank-number { width: 30px; font-weight: bold; color: #888; }
        .student-info { flex-grow: 1; margin-left: 10px; }
        .student-name { font-weight: bold; color: #333; display: block; }
        .student-meta { font-size: 11px; color: #777; }

        .score-badge { 
            background: var(--primary); color: white; 
            padding: 6px 15px; border-radius: 20px; 
            font-weight: bold; font-size: 14px; min-width: 40px; text-align: center;
        }
        
        .medal { font-size: 20px; margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-card">
        <i class="fa fa-trophy" style="font-size: 50px; color: var(--gold); margin-bottom: 10px;"></i>
        <h2 style="margin:0;">സലാഹ് ലീഡർബോർഡ്</h2>
        <p id="mName" style="opacity: 0.8; font-size: 14px; margin: 5px 0 0;">Loading Madrasa...</p>
    </div>

    <div id="display">
        <div style="text-align:center; color:#666; padding:20px;">വിവരങ്ങൾ ശേഖരിക്കുന്നു...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCe98Gw-si7idO0m8y5xbLLG8Z2HC3RCKE",
  authDomain: "mum-new-id.firebaseapp.com",
  projectId: "mum-new-id",
  storageBucket: "mum-new-id.firebasestorage.app",
  messagingSenderId: "794343464244",
  appId: "1:794343464244:web:f9083036490e3609bf1961",
  databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const rtdb = firebase.database();

const urlParams = new URLSearchParams(window.location.search);
const mId = urlParams.get('mid'); // Main page-ൽ നിന്ന് വരുന്നത് 'mid' ആണ്

// മദ്റസ പേര് ലോഡ് ചെയ്യുന്നു
if(mId) {
    rtdb.ref('madrasa_requests/' + mId).once('value', snap => {
        if(snap.exists()) document.getElementById('mName').innerText = snap.val().name;
    });
}

async function loadRank() {
    if(!mId) {
        document.getElementById('display').innerHTML = "Madrasa ID Missing!";
        return;
    }

    const display = document.getElementById('display');
    
    try {
        // ഈ മദ്റസയിലെ ആൺകുട്ടികളെ മാത്രം എടുക്കുന്നു
        const snapshot = await db.collection("students")
                                 .where("madrasa_id", "==", mId)
                                 .where("gender", "==", "Male")
                                 .get();
        
        display.innerHTML = "";
        
        if (snapshot.empty) {
            display.innerHTML = "<div style='text-align:center; padding:20px;'>വിവരങ്ങൾ ലഭ്യമല്ല.</div>";
            return;
        }

        // ഡാറ്റ കിട്ടിയ ശേഷം മാനുവലായി സോർട്ട് ചെയ്യുന്നു (താൽക്കാലികമായി)
        let students = [];
        snapshot.forEach(doc => students.push(doc.data()));
        students.sort((a, b) => (b.totalSalahMark || 0) - (a.totalSalahMark || 0));

        let rank = 1;
        students.forEach(s => {
            let rankClass = "";
            let medal = "";

            if(rank === 1) { rankClass = "rank-1"; medal = "🥇"; }
            else if(rank === 2) { rankClass = "rank-2"; medal = "🥈"; }
            else if(rank === 3) { rankClass = "rank-3"; medal = "🥉"; }
            else { medal = `<span class="rank-number">${rank}</span>`; }

            display.innerHTML += `
                <div class="rank-item ${rankClass}">
                    <div class="medal">${medal}</div>
                    <div class="student-info">
                        <span class="student-name">${s.name}</span>
                        <span class="student-meta">Reg: ${s.number} | Class: ${s.class}</span>
                    </div>
                    <div class="score-badge">${s.totalSalahMark || 0}</div>
                </div>`;
            rank++;
        });

    } catch (error) {
        console.error(error);
        display.innerHTML = "Error: " + error.message;
    }
}

window.onload = loadRank;
</script>

</body>
</html>
